<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b2545">
<title>FieldScout Pro — Crop Scouting Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if (window.pdfjsLib) { window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; }</script>
<script src="https://unpkg.com/shpjs@4.0.4/dist/shp.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --navy: #0b2545;
  --navy-2: #13315c;
  --navy-3: #1a3d6d;
  --ink: #0a1a2f;
  --cream: #f7f4ee;
  --paper: #ffffff;
  --line: #e3ddd0;
  --line-2: #d4ccb8;
  --muted: #6b7280;
  --text: #1a1f2e;
  --gold: #c89b3c;
  --rust: #c0392b;
  --leaf: #3a7a3a;
  --amber: #d68910;
  --shadow-sm: 0 1px 2px rgba(11,37,69,0.06);
  --shadow-md: 0 4px 16px rgba(11,37,69,0.08);
  --shadow-lg: 0 12px 40px rgba(11,37,69,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { overflow-x: hidden; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
button { cursor: pointer; border: none; background: none; }
input, select, textarea { outline: none; }

.topbar { background: var(--navy); color: var(--cream); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.08); }
.topbar-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; max-width: 1400px; margin: 0 auto; }
/* Push body content right of sidebar; .main's margin:auto then centers within remaining width */
body { transition: padding-left 0.22s ease; }
body[data-nav="expanded"]  { padding-left: 208px; }
body[data-nav="collapsed"] { padding-left: 64px; }
body[data-nav="hidden"]    { padding-left: 0; }
.brand { display: flex; align-items: center; gap: 12px; font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 19px; letter-spacing: -0.02em; }
.brand-mark { width: 36px; height: 36px; background: linear-gradient(135deg, var(--gold) 0%, #e3b855 100%); border-radius: 8px; display: grid; place-items: center; color: var(--navy); font-weight: 800; box-shadow: 0 2px 8px rgba(200,155,60,0.3); }
.brand-mark svg { width: 22px; height: 22px; }
.brand-sub { font-size: 10px; font-weight: 500; letter-spacing: 0.15em; opacity: 0.6; text-transform: uppercase; display: block; margin-top: -2px; }
.user-chip { display: flex; align-items: center; gap: 10px; padding: 6px 12px 6px 6px; background: rgba(255,255,255,0.08); border-radius: 999px; font-size: 13px; cursor: pointer; transition: background 0.2s; }
.user-chip:hover { background: rgba(255,255,255,0.14); }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--gold); color: var(--navy); display: grid; place-items: center; font-weight: 700; font-size: 12px; }
.role-badge { font-size: 10px; padding: 2px 7px; background: var(--gold); color: var(--navy); border-radius: 4px; font-weight: 700; letter-spacing: 0.04em; }

/* ===== SIDEBAR NAV =====
   States via data-nav attribute on <body>:
   - data-nav="expanded" : 208px wide, icon + label
   - data-nav="collapsed": 64px wide, icon only (label shows in tooltip)
   - data-nav="hidden"   : off-screen (mobile / user-hidden)
*/
.sidebar {
  position: fixed; top: 0; left: 0; height: 100vh;
  background: var(--navy-2); color: rgba(247,244,238,0.85);
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column;
  z-index: 90; transition: width 0.22s ease, transform 0.22s ease;
  overflow: hidden;
}
body[data-nav="expanded"]  .sidebar { width: 208px; transform: translateX(0); }
body[data-nav="collapsed"] .sidebar { width: 64px;  transform: translateX(0); }
body[data-nav="hidden"]    .sidebar { width: 208px; transform: translateX(-100%); }

.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 14px; height: 64px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}
.sidebar-title { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(247,244,238,0.55); white-space: nowrap; }
body[data-nav="collapsed"] .sidebar-title { display: none; }

.sidebar-toggle {
  width: 32px; height: 32px; border-radius: 6px;
  display: grid; place-items: center;
  color: rgba(247,244,238,0.7); background: rgba(255,255,255,0.06);
  transition: background 0.15s, color 0.15s; flex-shrink: 0;
}
.sidebar-toggle:hover { background: rgba(255,255,255,0.14); color: var(--cream); }
.sidebar-toggle svg { width: 16px; height: 16px; }

.sidebar-nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px 8px; scrollbar-width: thin; }
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.nav-tab {
  position: relative;
  display: flex; align-items: center; gap: 12px;
  width: 100%; padding: 11px 12px; margin-bottom: 2px;
  color: rgba(247,244,238,0.7); font-size: 14px; font-weight: 600;
  border-radius: 8px; white-space: nowrap;
  transition: background 0.15s, color 0.15s;
  text-align: left;
}
.nav-tab:hover { background: rgba(255,255,255,0.06); color: var(--cream); }
.nav-tab.active { background: rgba(200,155,60,0.15); color: var(--gold); }
.nav-tab.active::before {
  content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
  width: 3px; background: var(--gold); border-radius: 0 2px 2px 0;
}
.nav-tab svg { width: 20px; height: 20px; flex-shrink: 0; }
.nav-tab-label { flex: 1; }
body[data-nav="collapsed"] .nav-tab { justify-content: center; padding: 11px 0; }
body[data-nav="collapsed"] .nav-tab-label { display: none; }
body[data-nav="collapsed"] .nav-tab.active::before { left: 0; }

/* Tooltip when collapsed */
body[data-nav="collapsed"] .nav-tab:hover::after {
  content: attr(data-label);
  position: absolute; left: calc(100% + 8px); top: 50%; transform: translateY(-50%);
  background: var(--ink); color: var(--cream);
  padding: 6px 10px; border-radius: 6px;
  font-size: 12px; font-weight: 600; white-space: nowrap;
  box-shadow: var(--shadow-md);
  z-index: 200; pointer-events: none;
}

/* Mobile overlay backdrop when sidebar visible on small screens */
.sidebar-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(10,26,47,0.5); z-index: 85;
}
body.mobile-nav-open .sidebar-backdrop { display: block; }

/* Show toggle button in topbar to open sidebar when hidden */
.topbar-menu-btn {
  display: none;
  width: 38px; height: 38px; border-radius: 8px;
  align-items: center; justify-content: center;
  color: var(--cream); background: rgba(255,255,255,0.08);
  margin-right: 12px;
}
.topbar-menu-btn:hover { background: rgba(255,255,255,0.16); }
.topbar-menu-btn svg { width: 20px; height: 20px; }
body[data-nav="hidden"] .topbar-menu-btn { display: inline-flex; }

.main { max-width: 1400px; margin: 0 auto; padding: 24px 20px 80px; }
.page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
.page-title { font-family: 'Bricolage Grotesque', sans-serif; font-size: 32px; font-weight: 700; letter-spacing: -0.025em; color: var(--navy); }
.page-sub { color: var(--muted); font-size: 14px; margin-top: 4px; }
.page-actions { display: flex; gap: 10px; flex-wrap: wrap; }

.btn { padding: 11px 18px; border-radius: 8px; font-weight: 600; font-size: 14px; transition: all 0.15s ease; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; }
.btn svg { width: 16px; height: 16px; }
.btn-primary { background: var(--navy); color: white; }
.btn-primary:hover { background: var(--navy-2); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-secondary { background: var(--paper); color: var(--navy); border: 1px solid var(--line); }
.btn-secondary:hover { background: var(--cream); border-color: var(--navy); }
.btn-gold { background: var(--gold); color: var(--navy); }
.btn-gold:hover { background: #b8892f; transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-ghost { background: transparent; color: var(--muted); padding: 8px 12px; }
.btn-ghost:hover { color: var(--navy); background: rgba(11,37,69,0.05); }
.btn-danger { background: transparent; color: var(--rust); border: 1px solid var(--line); }
.btn-danger:hover { background: var(--rust); color: white; border-color: var(--rust); }
.btn-lg { padding: 14px 22px; font-size: 15px; }

.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.kpi { background: var(--paper); padding: 18px; border-radius: 12px; border: 1px solid var(--line); position: relative; overflow: hidden; }
.kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; }
.kpi-value { font-family: 'Bricolage Grotesque', sans-serif; font-size: 28px; font-weight: 700; color: var(--navy); margin-top: 4px; letter-spacing: -0.02em; }
.kpi-delta { font-size: 12px; color: var(--leaf); font-weight: 600; margin-top: 2px; }
.kpi-icon { position: absolute; top: 16px; right: 16px; color: var(--navy); opacity: 0.12; }
.kpi-icon svg { width: 32px; height: 32px; }
.kpi.alert .kpi-value { color: var(--rust); }
.kpi.alert .kpi-icon { color: var(--rust); opacity: 0.2; }
.kpi.warn .kpi-value { color: var(--amber); }
.kpi.warn .kpi-icon { color: var(--amber); opacity: 0.2; }

.dash-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
.panel { background: var(--paper); border-radius: 14px; border: 1px solid var(--line); overflow: hidden; }
.panel-head { padding: 18px 20px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
.panel-title { font-family: 'Bricolage Grotesque', sans-serif; font-size: 17px; font-weight: 700; color: var(--navy); letter-spacing: -0.01em; }
.panel-body { padding: 8px 0; }

.toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: var(--paper); padding: 12px; border-radius: 12px; border: 1px solid var(--line); }
.search-wrap { flex: 1; min-width: 200px; position: relative; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); width: 16px; height: 16px; }
.search-wrap input { width: 100%; padding: 10px 14px 10px 38px; border: 1px solid var(--line); border-radius: 8px; background: var(--cream); font-size: 14px; }
.search-wrap input:focus { background: var(--paper); border-color: var(--navy); }
.filter-select { padding: 10px 14px; border: 1px solid var(--line); border-radius: 8px; background: var(--cream); font-size: 14px; font-weight: 500; }
.filter-select:focus { background: var(--paper); border-color: var(--navy); }
.filter-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:10px; margin-bottom:14px; padding:14px; background:#fff; border:1px solid var(--border); border-radius:10px; }
.filter-cell { display:flex; flex-direction:column; gap:4px; min-width:0; }
.filter-cell label { font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.4px; }
.filter-cell .filter-select, .filter-cell input { width:100%; }
.fc-search { grid-column:span 2; }
.acre-range { display:flex; align-items:center; gap:6px; }
.acre-range input { min-width:0; flex:1; padding:8px 10px; border:1px solid var(--line); border-radius:8px; background:var(--cream); font-size:13px; }
.acre-range span { color:var(--muted); font-weight:600; }
@media (max-width:700px) { .fc-search { grid-column:span 1; } }

/* Hybrids tab polish */
.hybrid-toolbar { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
.hybrid-toolbar .search-wrap { flex:1; min-width:220px; }
.hybrid-toolbar .filter-select { min-width:180px; }
.hybrid-card { position:relative; }
.hybrid-card-body { padding:0; cursor:pointer; }
.hybrid-card-delete { position:absolute; top:8px; right:8px; width:28px; height:28px; border-radius:6px; background:rgba(192,57,43,0.08); color:#c0392b; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:all 0.15s; z-index:2; }
.hybrid-card-delete svg { width:14px; height:14px; }
.hybrid-card:hover .hybrid-card-delete { opacity:1; }
.hybrid-card-delete:hover { background:#c0392b; color:#fff; }
.hybrid-badges { display:flex; gap:4px; margin:4px 0 4px; flex-wrap:wrap; }
.src-badge { display:inline-block; padding:2px 8px; border-radius:5px; font-size:10px; font-weight:700; letter-spacing:0.4px; text-transform:uppercase; }
.src-dekalb { background:rgba(11,37,69,0.1); color:var(--navy); border:1px solid rgba(11,37,69,0.2); }
.src-pioneer { background:rgba(192,57,43,0.1); color:#c0392b; border:1px solid rgba(192,57,43,0.2); }
.src-channelbasf, .src-channel { background:rgba(123,45,142,0.1); color:#7b2d8e; border:1px solid rgba(123,45,142,0.2); }
.src-croplan { background:rgba(58,122,58,0.1); color:#3a7a3a; border:1px solid rgba(58,122,58,0.2); }
.src-stinewyffels, .src-stine { background:rgba(214,137,16,0.1); color:#a96e0a; border:1px solid rgba(214,137,16,0.2); }
.src-goldenharvest, .src-golden { background:rgba(200,155,60,0.12); color:#8a6720; border:1px solid rgba(200,155,60,0.25); }
.src-seedproduction, .src-seed { background:rgba(11,37,69,0.06); color:var(--muted); border:1px solid var(--border); }
.src-manual, .src-other { background:rgba(11,37,69,0.05); color:var(--muted); border:1px dashed var(--border); }

/* Map controls bar */
.map-controls-bar { display:flex; align-items:center; gap:10px; margin-bottom:10px; padding:10px 12px; background:#fff; border:1px solid var(--border); border-radius:10px; flex-wrap:wrap; }
.map-control-btn { background:rgba(11,37,69,0.06); border:1px solid var(--border); color:var(--navy); padding:7px 14px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:7px; transition:all 0.15s; }
.map-control-btn:hover { background:rgba(11,37,69,0.12); }
.map-control-btn.active { background:var(--navy); color:#fff; border-color:var(--navy); }
.map-control-btn.has-filters { background:rgba(200,155,60,0.18); border-color:rgba(200,155,60,0.45); color:#8a6720; }
.map-control-btn.active.has-filters { background:#c89b3c; color:#fff; }
.map-control-btn svg { width:14px; height:14px; }
.map-clear { background:rgba(192,57,43,0.08); color:#c0392b; }
.map-clear:hover { background:rgba(192,57,43,0.15); }
.map-legend-inline { display:flex; gap:6px; margin-left:auto; flex-wrap:wrap; }
.map-toggle { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--ink); cursor:pointer; user-select:none; }
.map-toggle input { width:16px; height:16px; cursor:pointer; }
.map-filter-grid { margin-bottom:12px; }
@media (max-width:700px) { .map-legend-inline { margin-left:0; width:100%; } }

/* Reports tab — list rows with checkboxes + export bar */
.reports-export-bar { display:flex; align-items:center; gap:12px; margin-bottom:12px; padding:10px 14px; background:#fff; border:1px solid var(--border); border-radius:10px; flex-wrap:wrap; }
.reports-select-all { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink); cursor:pointer; user-select:none; font-weight:600; }
.reports-select-all input { width:16px; height:16px; cursor:pointer; }
.reports-export-actions { margin-left:auto; display:flex; gap:6px; flex-wrap:wrap; }
.report-row { display:flex; align-items:stretch; border-bottom:1px solid var(--border); transition:background 0.12s; }
.report-row:last-child { border-bottom:none; }
.report-row:hover { background:rgba(11,37,69,0.02); }
.report-row-selected { background:rgba(200,155,60,0.06); }
.report-row-selected:hover { background:rgba(200,155,60,0.1); }
.report-check { width:18px; height:18px; margin:18px 14px; cursor:pointer; flex-shrink:0; }
.report-row-body { flex:1; padding:14px 16px 14px 0; cursor:pointer; min-width:0; }
.report-row-main { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px; }
.report-field-name { font-weight:700; color:var(--navy); font-size:15px; }
.report-meta { font-size:12px; color:var(--muted); margin-top:2px; }
.report-priority { display:inline-block; padding:3px 10px; border-radius:5px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
.pri-urgent { background:rgba(192,57,43,0.15); color:#a02b1f; }
.pri-high { background:rgba(214,137,16,0.15); color:#a96e0a; }
.pri-medium { background:rgba(200,155,60,0.15); color:#8a6720; }
.pri-low { background:rgba(58,122,58,0.12); color:#3a7a3a; }
.report-health-strip { display:flex; align-items:center; gap:10px; }
.report-health-bar { flex:1; height:6px; background:rgba(11,37,69,0.08); border-radius:3px; overflow:hidden; }
.report-health-fill { height:100%; transition:width 0.3s; }
.report-health-val { font-size:11px; color:var(--muted); font-weight:600; font-family:'JetBrains Mono', monospace; }
.report-row-delete { width:32px; height:32px; margin:18px 14px 18px 0; border-radius:6px; background:transparent; border:none; color:var(--muted); cursor:pointer; opacity:0; transition:all 0.15s; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.report-row-delete svg { width:16px; height:16px; }
.report-row:hover .report-row-delete { opacity:1; color:#c0392b; }
.report-row-delete:hover { background:rgba(192,57,43,0.12); }

.field-list { display: flex; flex-direction: column; }
.field-row { display: grid; grid-template-columns: auto 1fr auto auto; gap: 14px; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background 0.15s; }
.field-row:last-child { border-bottom: none; }
.field-row:hover { background: var(--cream); }
.status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.status-good { background: var(--leaf); box-shadow: 0 0 0 3px rgba(58,122,58,0.15); }
.status-watch { background: var(--amber); box-shadow: 0 0 0 3px rgba(214,137,16,0.15); }
.status-action { background: var(--rust); box-shadow: 0 0 0 3px rgba(192,57,43,0.18); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 0 3px rgba(192,57,43,0.18); } 50% { box-shadow: 0 0 0 6px rgba(192,57,43,0.08); } }
.field-info-main { font-weight: 600; color: var(--navy); font-size: 15px; }
.field-info-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.field-acres { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--navy); text-align: right; font-size: 13px; }
.field-acres span { font-size: 10px; color: var(--muted); display: block; }
.field-arrow { color: var(--muted); }
.field-arrow svg { width: 16px; height: 16px; }

.badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; display: inline-block; }
.badge-good { background: rgba(58,122,58,0.1); color: var(--leaf); }
.badge-watch { background: rgba(214,137,16,0.12); color: var(--amber); }
.badge-action { background: rgba(192,57,43,0.1); color: var(--rust); }
.badge-info { background: rgba(11,37,69,0.08); color: var(--navy); }

.report-item { padding: 14px 20px; border-bottom: 1px solid var(--line); display: flex; flex-direction: column; gap: 4px; }
.report-item:last-child { border-bottom: none; }
.report-item-head { display: flex; justify-content: space-between; align-items: center; }
.report-field { font-weight: 600; font-size: 14px; color: var(--navy); }
.report-date { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
.report-summary { font-size: 12px; color: var(--muted); }

.modal-backdrop { position: fixed; inset: 0; background: rgba(10,26,47,0.55); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }

/* Source badges (seed company) */

.new-badge { display:inline-block; padding:1px 6px; border-radius:4px; background:#3a7a3a; color:#fff; font-size:9px; font-weight:800; letter-spacing:0.5px; vertical-align:middle; margin-left:4px; }
.pop-na { color:var(--muted); font-style:italic; font-size:11px; }

/* Hybrid view tabs */

/* Unmatched plantings list */

.unmatched-group-head { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:rgba(11,37,69,0.04); border-bottom:1px solid var(--border); font-size:14px; color:var(--navy); }

.unmatched-name { font-weight:700; color:var(--navy); font-size:15px; font-family:'JetBrains Mono', monospace; }

.unmatched-fields { margin-top:6px; font-size:12px; line-height:1.7; }

.btn-rust { background:#c0392b; color:#fff; }

.link-existing-panel { background:linear-gradient(135deg, rgba(200,155,60,0.08), rgba(11,37,69,0.04)); border:1px solid rgba(200,155,60,0.35); border-radius:10px; padding:14px 16px; margin-bottom:14px; }
.link-existing-label { margin-bottom:10px; display:flex; flex-direction:column; gap:3px; }

.link-divider { display:flex; align-items:center; gap:10px; margin:14px 0 10px; color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }

.hybrid-card-alias { border-left:3px solid var(--gold); background:rgba(200,155,60,0.04); }

/* Leaflet map */

.map-legend-chip { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:rgba(11,37,69,0.06); border-radius:14px; font-size:12px; font-weight:600; color:var(--navy); }
.map-legend-chip .dot-good, .map-legend-chip .dot-watch, .map-legend-chip .dot-action, .map-legend-chip .dot-nobound { width:10px; height:10px; border-radius:50%; }

.bm-list { display:flex; flex-direction:column; gap:8px; }

/* GDU stage estimator */
.gdu-stage-panel { background:#fff; border-radius:8px; padding:14px; border:1px solid var(--border); }

.gdu-now-unit { font-size:13px; color:var(--muted); font-weight:600; font-family:'Inter', sans-serif; }
.gdu-now-lbl { font-size:12px; color:var(--muted); }
.gdu-next { margin-top:10px; padding:10px 12px; background:rgba(200,155,60,0.08); border-radius:6px; font-size:13px; color:var(--ink); }

.gdu-details { margin-top:12px; }
.gdu-details summary { cursor:pointer; font-size:13px; font-weight:600; color:var(--navy); padding:6px 0; }
.gdu-stage-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(110px, 1fr)); gap:8px; }
.gs-cell { background:rgba(11,37,69,0.04); border:1px solid var(--border); border-radius:8px; padding:8px 10px; text-align:center; transition:all 0.15s; }

.gs-current { background:linear-gradient(135deg, rgba(11,37,69,0.12), rgba(200,155,60,0.12)); border-color:var(--navy); box-shadow:0 2px 8px rgba(11,37,69,0.15); }
.gs-current .gs-stage { color:var(--navy); font-weight:800; }
.gs-past { opacity:0.55; }
.gs-stage { font-weight:700; color:var(--navy); font-size:13px; }
.gs-label { font-size:10px; color:var(--muted); margin-top:1px; }
.gs-gdu { font-weight:700; font-family:'JetBrains Mono', monospace; color:var(--ink); font-size:13px; margin-top:4px; }
.field-label { background:rgba(11,37,69,0.85); color:#fff; border:none; padding:4px 8px; font-size:11px; line-height:1.3; font-family:'Inter', sans-serif; border-radius:5px; box-shadow:0 2px 6px rgba(0,0,0,0.3); }
.field-label::before { display:none; }
@media (max-width:540px) { .leaflet-map-container { height:480px; } }
.hybrid-card-empty { border-left:3px solid #d68910; background:rgba(214,137,16,0.03); }
.hybrid-needs { background:rgba(214,137,16,0.15) !important; color:#a96e0a !important; font-size:10px; }
.ps-val { font-weight:700; color:var(--navy); font-size:14px; margin-top:1px; }
.planting-ratings { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
.pr-tag { background:rgba(11,37,69,0.06); color:var(--navy); padding:3px 9px; border-radius:10px; font-size:11px; font-weight:600; font-family:'JetBrains Mono', monospace; }
.planting-actions { display:flex; gap:14px; flex-wrap:wrap; }
.btn-link-amber { color:#a96e0a; }
.btn-link-amber:hover { background:rgba(214,137,16,0.08); }
.planting-no-match { background:rgba(214,137,16,0.06); border:1px dashed rgba(214,137,16,0.4); border-radius:6px; padding:10px 12px; }
.pnm-msg { font-size:12px; color:#a96e0a; margin-bottom:8px; }

/* Match status badges */
.mt-badge { display:inline-block; padding:3px 9px; border-radius:10px; font-size:10px; font-weight:700; letter-spacing:0.4px; text-transform:uppercase; white-space:nowrap; flex-shrink:0; }

/* Match picker */
.match-intro { font-size:13px; color:var(--muted); line-height:1.5; margin-bottom:14px; padding:10px 12px; background:rgba(200,155,60,0.08); border-radius:6px; }

.mc-head { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:4px; }
.mc-head strong { color:var(--navy); font-size:14px; }
.mc-score { font-size:11px; font-weight:700; color:var(--gold); background:rgba(200,155,60,0.13); padding:2px 8px; border-radius:9px; }
.mc-meta { font-size:11px; color:var(--muted); font-family:'JetBrains Mono', monospace; }
.match-clear { border-top:1px dashed var(--border); padding-top:12px; }
.gdu-cell { text-align:center; }
.gdu-lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.4px; font-weight:600; margin-bottom:4px; }
.gdu-val { font-weight:700; color:var(--navy); font-size:20px; font-family:'JetBrains Mono', monospace; }
.gdu-unit { font-size:11px; color:var(--muted); font-weight:500; margin-left:4px; font-family:'Inter', sans-serif; }
@media (max-width:900px) { .gdu-strip { grid-template-columns:repeat(3,1fr); } }
@media (max-width:540px) { .gdu-strip { grid-template-columns:repeat(2,1fr); } .gdu-val { font-size:17px; } }

/* Hybrid cards */
.hybrid-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:14px; }
.hybrid-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:16px; cursor:pointer; transition:all 0.18s; }

.hybrid-card-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; gap:10px; }

.hybrid-tagline { font-size:12px; color:var(--muted); margin-top:2px; }

.hybrid-ratings { display:flex; flex-direction:column; gap:6px; }
.hr-row { display:flex; justify-content:space-between; align-items:center; font-size:12px; gap:8px; }

/* Population grid */
.pop-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.pop-cell { background:rgba(11,37,69,0.04); padding:10px 12px; border-radius:8px; text-align:center; }
.pop-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.3px; font-weight:600; }

/* Grower grid */
.grower-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:14px; }

.grower-avatar { width:48px; height:48px; border-radius:10px; background:linear-gradient(135deg, var(--navy), #1a3a5f); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:20px; }
.grower-name { font-weight:700; color:var(--navy); font-size:16px; }
.grower-farms { font-size:12px; color:var(--muted); margin-top:2px; }
.grower-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
.g-stat { text-align:center; padding:10px 6px; background:rgba(11,37,69,0.04); border-radius:8px; }
.g-stat-val { font-weight:700; color:var(--navy); font-size:18px; }
.g-stat-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.3px; }
.grower-notes { font-size:13px; color:var(--muted); margin-bottom:12px; padding:10px; background:rgba(11,37,69,0.03); border-radius:8px; line-height:1.5; }

/* Import grid */
.import-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

.import-desc { font-size:13px; color:var(--muted); margin-bottom:14px; line-height:1.55; }

/* Dropzone extras */
.dz-icon { width:42px; height:42px; color:var(--navy); opacity:0.5; margin-bottom:10px; }
.dz-title { font-weight:600; color:var(--ink); margin-bottom:4px; }
.dz-link { color:var(--navy); text-decoration:underline; }
.dz-sub { font-size:12px; color:var(--muted); }

/* Map */
.map-tool-lbl { font-weight:600; color:var(--navy); font-size:13px; margin-right:4px; }
.map-bg { width:100%; height:100%; display:block; }
.map-pin-dot { width:18px; height:18px; border-radius:50%; border:3px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,0.35); transition:transform 0.15s; }
.map-pin:hover .map-pin-dot { transform:scale(1.25); }
.map-pin-weed .map-pin-dot { background:#d68910; }
.map-pin-disease .map-pin-dot { background:#c0392b; }
.map-pin-insect .map-pin-dot { background:#7b2d8e; }
.map-pin-other .map-pin-dot { background:#3a7a3a; }
.dot-weed, .dot-disease, .dot-insect, .dot-other { display:inline-block; width:10px; height:10px; border-radius:50%; vertical-align:middle; margin-right:4px; }
.dot-weed { background:#d68910; }
.dot-disease { background:#c0392b; }
.dot-insect { background:#7b2d8e; }
.dot-other { background:#3a7a3a; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--ink); }

/* Report row in list */
.report-row { display:grid; grid-template-columns:auto 1fr auto; gap:14px; align-items:center; padding:14px 18px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s; }

.report-health { flex-shrink:0; }

.health-leaf { background:#3a7a3a; }
.health-amber { background:#d68910; }
.health-rust { background:#c0392b; }
.report-info { min-width:0; }
.report-title { font-weight:600; color:var(--navy); font-size:14px; }
.report-meta { font-size:12px; color:var(--muted); margin-top:2px; display:flex; flex-wrap:wrap; gap:4px; }
.report-priority { padding:4px 10px; border-radius:10px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.3px; }
.p-low { background:rgba(58,122,58,0.12); color:#2d5a2d; }
.p-medium { background:rgba(214,137,16,0.14); color:#a96e0a; }
.p-high { background:rgba(192,57,43,0.13); color:#a02b1f; }

/* Report builder sections */
.rb-section { background:#fff; border:1px solid var(--border); border-radius:10px; margin-bottom:14px; overflow:hidden; }
.rb-section-head { padding:12px 16px; border-bottom:1px solid var(--border); }
.rb-section-title { font-weight:700; color:var(--navy); font-size:13px; text-transform:uppercase; letter-spacing:0.4px; }

.rb-amber { background:rgba(214,137,16,0.08); }
.rb-rust { background:rgba(192,57,43,0.08); }
.rb-navy { background:rgba(11,37,69,0.05); }

/* Photo tiles */
.photo-tile { position:relative; border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#fff; }

/* Report view (printable) */
.report-view { background:#fff; padding:30px; border-radius:8px; border:1px solid var(--border); }

.report-brand-name { font-family:'Bricolage Grotesque', sans-serif; font-weight:700; font-size:22px; color:var(--navy); letter-spacing:-0.5px; }
.report-brand-sub { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.report-health-ring { text-align:center; }
.report-health-ring svg { width:70px; height:70px; }
.report-health-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.4px; font-weight:600; margin-top:2px; }

.report-meta-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; padding:16px; background:rgba(11,37,69,0.03); border-radius:8px; }
.rm-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.4px; font-weight:600; }
.rm-val { font-weight:600; color:var(--navy); margin-top:2px; font-size:14px; }
.rm-priority { display:inline-block; padding:3px 10px; border-radius:10px; font-size:12px; text-transform:uppercase; letter-spacing:0.3px; }

.report-row-block { padding:10px 14px; background:rgba(11,37,69,0.03); border-radius:8px; margin-bottom:16px; font-size:14px; }
.report-section { margin-bottom:18px; padding:14px 16px; background:#fff; border:1px solid var(--border); border-radius:8px; }
.report-section-title { font-weight:700; color:var(--navy); font-size:13px; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.report-section-rec { background:rgba(200,155,60,0.06); border-color:rgba(200,155,60,0.3); }
.rec-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.rec-action { margin-top:12px; padding-top:12px; border-top:1px dashed var(--border); font-size:14px; line-height:1.55; }
.report-photos { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.report-photo { border:1px solid var(--border); border-radius:6px; overflow:hidden; }
.report-photo img { width:100%; height:140px; object-fit:cover; display:block; }
.rp-caption { font-size:11px; color:var(--muted); padding:5px 8px; }
.report-footer { text-align:center; font-size:11px; color:var(--muted); padding-top:16px; margin-top:20px; border-top:1px solid var(--border); }

@media (max-width:900px) {
  .report-meta-grid, .rec-grid { grid-template-columns:repeat(2,1fr); }
  .report-photos { grid-template-columns:repeat(2,1fr); }
  .report-view { padding:20px; }
  .report-header { flex-direction:column; align-items:flex-start; gap:14px; }
}

.sync-chip { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:rgba(255,255,255,0.1); border-radius:14px; font-size:11px; font-weight:600; color:#fff; margin-right:10px; cursor:pointer; user-select:none; }
.sync-dot { width:8px; height:8px; border-radius:50%; background:#888; transition:background 0.2s; }
.sync-dot.synced { background:#3a7a3a; box-shadow:0 0 6px rgba(58,122,58,0.7); }
.sync-dot.saving { background:#c89b3c; animation:sync-pulse 1s infinite; }
.sync-dot.error { background:#c63b3b; }
.sync-dot.offline { background:#888; }
@keyframes sync-pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  hybridOverrides: {},    // raw hybrid string -> confirmed library hybrid name
};

function uid(p) { return p + '_' + Math.random().toString(36).slice(2, 9); }

function bootstrapData() {
  // Build fields from new structured FIELDS_DATA (already grouped, with plantings array)
  state.fields = FIELDS_DATA.map(rec => ({
    id: uid('f'),
    grower: 'HF Farms',
    farm: 'Panorama',
    name: rec.name,
    acres: rec.total_acres || 0,
    crop: 'Corn',
    hybrid: rec.primary_hybrid || '',       // legacy single-hybrid field (used elsewhere)
    plantingDate: rec.primary_date || '',
    prevCrop: 'Soybeans',
    population: rec.primary_population || 0,
    rowSpacing: 30,
    soil: '',
    notes: '',
    plantings: (rec.plantings || []).map(p => ({
      hybridRaw: p.hybrid_raw || '',
      matchedHybrid: p.matched_hybrid || null,
      matchStatus: p.match_status || 'unknown',  // exact | fuzzy | ambiguous | unknown
      acres: p.acres || 0,
      acresEstimated: !!p.acres_estimated,
      planted: p.planted || '',
      population: p.population || 0,
    })),
    isTrial: !!rec.is_trial,
  })).sort((a, b) => a.name.localeCompare(b.name));

  // Grower record
  state.growers = [{
    id: uid('g'),
    name: 'HF Farms',
    farms: ['Panorama'],
    contact: '',
    notes: 'Primary corn operation. ' + state.fields.length + ' fields tracked.',
  }];

  // Hybrid library
  state.hybrids = HYBRID_DATA.slice();

  // Default all field statuses to good
  state.fields.forEach(f => { state.fieldStatuses[f.id] = 'good'; });
}

/* ============ CLOUD SYNC (Firebase Firestore) ============ */
const cloudSync = (function() {
  const WORKSPACE = 'shared';                  // single shared workspace per your choice
  const SAVE_DEBOUNCE_MS = 300;                // batch rapid edits
  let saveTimer = null;
  let pendingKeys = new Set();                 // which doc shards are dirty
  let suppressSave = false;                    // true while we're applying remote updates
  let initialized = false;
  let unsubscribers = [];
  let lastSavedAt = 0;
  let lastRemoteAt = 0;

  function setStatus(state, label) {
    const dot = document.getElementById('syncDot');
    const lbl = document.getElementById('syncLabel');
    if (dot) { dot.className = 'sync-dot ' + state; }
    if (lbl) { lbl.textContent = label; }
  }

  // Which slices of state go into which Firestore documents.
  // Splitting keeps each doc under Firestore's 1 MB limit and avoids
  // re-uploading photos every time a note changes.
  const SHARDS = {
    fields:   ['fields', 'fieldStatuses', 'fieldBoundaries', 'pendingBoundaries', 'growers'],
    hybrids:  ['hybrids', 'hybridOverrides'],
    reports:  ['reports'],
    media:    ['photos', 'mapPins'],
  };

  function packShard(shardName) {
    const out = {};
    SHARDS[shardName].forEach(k => { out[k] = state[k]; });
    return out;
  }

  function applyShard(shardName, data) {
    if (!data) return;
    // Data may be wrapped in {payload: "<json>"} or live as fields directly (legacy)
    let parsed = data;
    if (typeof data.payload === 'string') {
      try { parsed = JSON.parse(data.payload); } catch (e) { console.error('Bad shard JSON', e); return; }
    }
    SHARDS[shardName].forEach(k => {
      if (parsed[k] !== undefined) state[k] = parsed[k];
    });
  }

  async function loadAll() {
    const { db, doc, getDoc } = window.__fb;
    const shardNames = Object.keys(SHARDS);
    const results = await Promise.all(shardNames.map(name =>
      getDoc(doc(db, 'workspaces', WORKSPACE, 'data', name))
    ));
    let anyData = false;
    results.forEach((snap, i) => {
      if (snap.exists()) {
        applyShard(shardNames[i], snap.data());
        anyData = true;
      }
    });
    return anyData;
  }

  async function saveShard(shardName) {
    const { db, doc, setDoc, serverTimestamp } = window.__fb;
    const json = JSON.stringify(packShard(shardName));
    // Firestore hard limit is ~1 MB per document. Warn well before that.
    if (json.length > 900000) {
      console.warn(`Shard "${shardName}" is ${(json.length/1024).toFixed(0)} KB — approaching Firestore's 1 MB limit. Consider exporting and trimming old photos.`);
      if (json.length > 1000000) {
        throw new Error(`Shard "${shardName}" exceeds 1 MB. Export your data and remove old photos, then try again.`);
      }
    }
    const clientTime = Date.now();
    lastSavedAt = clientTime;
    const payload = {
      payload: json,
      __updatedAt: serverTimestamp(),
      __clientTime: clientTime,
    };
    await setDoc(doc(db, 'workspaces', WORKSPACE, 'data', shardName), payload);
  }

  async function flushSaves() {
    if (suppressSave || !initialized) return;
    if (pendingKeys.size === 0) return;
    const keys = Array.from(pendingKeys);
    pendingKeys.clear();
    setStatus('saving', 'Saving…');
    try {
      await Promise.all(keys.map(saveShard));
      setStatus('synced', 'Synced');
    } catch (err) {
      console.error('Save failed:', err);
      setStatus('error', 'Save failed');
      // re-queue so next change retries
      keys.forEach(k => pendingKeys.add(k));
    }
  }

  function scheduleSave(stateKey) {
    if (suppressSave || !initialized) return;
    // Figure out which shard this state key belongs to
    for (const [shard, keys] of Object.entries(SHARDS)) {
      if (keys.includes(stateKey)) {
        pendingKeys.add(shard);
        break;
      }
    }
    clearTimeout(saveTimer);
    saveTimer = setTimeout(flushSaves, SAVE_DEBOUNCE_MS);
    setStatus('saving', 'Saving…');
  }

  function attachListeners() {
    const { db, doc, onSnapshot } = window.__fb;
    Object.keys(SHARDS).forEach(shardName => {
      const ref = doc(db, 'workspaces', WORKSPACE, 'data', shardName);
      const unsub = onSnapshot(ref, snap => {
        if (!snap.exists()) return;
        const data = snap.data();
        // Ignore echoes of our own writes
        if (data.__clientTime && Math.abs(data.__clientTime - lastSavedAt) < 100) return;
        if (data.__clientTime && data.__clientTime <= lastRemoteAt) return;
        lastRemoteAt = data.__clientTime || Date.now();
        suppressSave = true;
        applyShard(shardName, data);
        suppressSave = false;
        if (typeof render === 'function') render();
        toast && toast('Updated from another device');
      }, err => {
        console.error('Listener error:', err);
        setStatus('error', 'Sync error');
      });
      unsubscribers.push(unsub);
    });
  }

  async function init() {
    setStatus('saving', 'Loading…');
    try {
      const hadCloudData = await loadAll();
      if (!hadCloudData) {
        // First-ever run: seed from built-in data and upload it
        bootstrapData();
        initialized = true;
        // Upload all shards as the initial state
        await Promise.all(Object.keys(SHARDS).map(saveShard));
      } else {
        // Make sure fieldStatuses exist for every field (in case schema drifted)
        state.fields.forEach(f => {
          if (!state.fieldStatuses[f.id]) state.fieldStatuses[f.id] = 'good';
        });
        initialized = true;
      }
      attachListeners();
      setStatus('synced', 'Synced');
      if (typeof render === 'function') render();
    } catch (err) {
      console.error('Cloud sync init failed:', err);
      setStatus('error', 'Offline');
      // Fall back to local-only mode so the app still works
      bootstrapData();
      if (typeof render === 'function') render();
    }
  }

  return {
    init,
    scheduleSave,
    forceSave: () => {
      clearTimeout(saveTimer);
      // Mark every shard dirty
      Object.keys(SHARDS).forEach(s => pendingKeys.add(s));
      flushSaves();
    },
    isReady: () => initialized,
  };
})();

// Trigger save when any tracked state slice changes.
// Anything that mutates state.* should call cloudSync.scheduleSave('fields') etc.
// To make that automatic, we wrap the top-level state with a Proxy.
const __rawState = state;
const __trackedKeys = new Set([
  'fields', 'fieldStatuses', 'fieldBoundaries', 'pendingBoundaries', 'growers',
  'hybrids', 'hybridOverrides', 'reports', 'photos', 'mapPins'
]);
// Note: we don't proxy nested mutations (e.g. state.fields[0].notes = 'x').
// Instead, every save function in the app calls render(), and we hook render()
// to trigger a save of any tracked key that might have been touched.
// Simpler & robust: just save-everything-dirty on each render after init.
const __origRender = (typeof render === 'function') ? render : null;

function startCloudSync() {
  if (window.__fb) {
    cloudSync.init();
  } else {
    window.addEventListener('firebase-ready', () => cloudSync.init(), { once: true });
  }
}

// Track last-saved fingerprints per shard to detect real changes.
// We compare a quick JSON serialization; if a shard's content differs
// from what we last saw, we schedule a save for that shard only.
const __shardFingerprints = {};
function detectChangesAndSave() {
  if (!cloudSync.isReady()) return;
  const SHARDS = {
    fields:  ['fields', 'fieldStatuses', 'fieldBoundaries', 'pendingBoundaries', 'growers'],
    hybrids: ['hybrids', 'hybridOverrides'],
    reports: ['reports'],
    media:   ['photos', 'mapPins'],
  };
  for (const [shard, keys] of Object.entries(SHARDS)) {
    let fp = '';
    for (const k of keys) {
      try { fp += '|' + (state[k] ? JSON.stringify(state[k]).length + ':' + (JSON.stringify(state[k]).slice(0, 200)) : ''); }
      catch(e) { fp += '|err'; }
    }
    // Use length + head + tail as a cheap fingerprint
    try {
      const full = keys.map(k => JSON.stringify(state[k] || null)).join('|');
      fp = full.length + ':' + full.slice(0, 100) + ':' + full.slice(-100);
    } catch(e) {}
    if (__shardFingerprints[shard] !== fp) {
      __shardFingerprints[shard] = fp;
      // Trigger a save by adding any one tracked key from this shard
      cloudSync.scheduleSave(keys[0]);
    }
  }
}

/* ============ HELPERS ============ */
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function daysAfter(dateStr) {
  if (!dateStr) return 0;
  const d = new Date(dateStr);
  if (isNaN(d)) return 0;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}

function statusLabel(s) {
  return { good: 'Good', watch: 'Watch', action: 'Action' }[s] || 'Good';
}

// Determine the dominant seed brand for a field. Prefers explicit `source` on matched hybrids
// in the library (so user-edited supplier propagates everywhere), falls back to name heuristic.
function fieldBrand(f) {
  const plantings = f.plantings || [];
  if (plantings.length === 0) return 'Other';
  const brands = plantings.map(p => {
    // Resolve to library hybrid if matched (or overridden)
    const name = state.hybridOverrides[p.hybridRaw] || p.matchedHybrid;
    if (name) {
      const h = state.hybrids.find(x => x.name === name);
      const r = h ? resolveHybridData(h) : null;
      if (r && r.source) return r.source;
    }
    return brandFromHybridName(p.hybridRaw);
  });
  const counts = {};
  brands.forEach(b => counts[b] = (counts[b] || 0) + 1);
  return Object.keys(counts).sort((a, b) => counts[b] - counts[a])[0];
}

// Latest scouting report date for a field (YYYY-MM-DD or null)
function lastScoutedDate(fid) {
  let latest = null;
  state.reports.forEach(r => {
    if (r.fieldId === fid && r.date && (!latest || r.date > latest)) latest = r.date;
  });
  return latest;
}

function daysSinceScouted(fid) {
  const d = lastScoutedDate(fid);
  if (!d) return null;
  const then = new Date(d + 'T00:00:00');
  const now = new Date();
  return Math.floor((now - then) / (24 * 60 * 60 * 1000));
}

// Quick sync GDU estimate from planting date using an Iowa seasonal curve.
// Returns null if no planting date. Used for filtering — for the precise number
// in the field detail panel we still fetch from Open-Meteo.
function estimateCurrentGdu(f) {
  if (!f || !f.plantingDate) return null;
  const plant = new Date(f.plantingDate + 'T00:00:00');
  const now = new Date();
  if (isNaN(plant) || now < plant) return 0;
  let total = 0;
  for (let d = new Date(plant); d <= now; d.setDate(d.getDate() + 1)) {
    const m = d.getMonth(); // 0-11
    // Iowa avg daily GDU base 50 ceil 86
    const seasonal = [0, 0, 5, 12, 18, 22, 26, 27, 24, 16, 8, 2][m];
    total += seasonal;
  }
  return Math.round(total);
}

// Use the first matched hybrid on a field to get a stage table, then find current stage
function estimateCurrentStage(f) {
  const gdu = estimateCurrentGdu(f);
  if (gdu == null) return null;
  const firstPlanting = (f.plantings || []).find(p => p.matchedHybrid || state.hybridOverrides[p.hybridRaw]);
  if (!firstPlanting) return null;
  const name = state.hybridOverrides[firstPlanting.hybridRaw] || firstPlanting.matchedHybrid;
  const h = state.hybrids.find(x => x.name === name);
  if (!h) return null;
  const tbl = buildStageTable(h);
  if (!tbl) return null;
  const sf = findStageForGdu(tbl, gdu);
  return sf ? sf.current.stage : null;
}

function brandFromHybridName(name) {
  const n = (name || '').toUpperCase().trim();
  if (!n) return 'Other';
  if (n.startsWith('DK') || n.startsWith('DC')) return 'Dekalb';
  if (n.startsWith('P') && /\d/.test(n.slice(0, 4))) return 'Pioneer';
  if (n.startsWith('CH')) return 'Croplan';
  if (n.startsWith('C') && /\d/.test(n.slice(0, 4))) return 'Channel / BASF';
  if (n.startsWith('W')) return 'Stine / Wyffels';
  if (n.startsWith('GH')) return 'Golden Harvest';
  if (/FEMALE|MALE/i.test(name)) return 'Seed Production';
  return 'Other';
}

function filterFields() {
  const q = state.search.toLowerCase().trim();
  let result = state.fields.filter(f => {
    if (q) {
      const hay = (f.name + ' ' + f.hybrid + ' ' + f.grower + ' ' + (f.plantings || []).map(p => p.hybridRaw).join(' ')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (state.cropFilter !== 'all' && f.crop !== state.cropFilter) return false;
    if (state.statusFilter !== 'all' && state.fieldStatuses[f.id] !== state.statusFilter) return false;
    if (state.growerFilter !== 'all' && f.grower !== state.growerFilter) return false;
    if (state.trialFilter === 'trials' && !f.isTrial) return false;
    if (state.trialFilter === 'standard' && f.isTrial) return false;
    if (state.brandFilter && state.brandFilter !== 'all' && fieldBrand(f) !== state.brandFilter) return false;
    if (state.boundaryFilter === 'with' && !state.fieldBoundaries[f.id]) return false;
    if (state.boundaryFilter === 'without' && state.fieldBoundaries[f.id]) return false;
    const reportCount = state.reports.filter(r => r.fieldId === f.id).length;
    if (state.reportsFilter === 'with' && reportCount === 0) return false;
    if (state.reportsFilter === 'without' && reportCount > 0) return false;
    // Scouted filter
    const sf = state.scoutedFilter || 'all';
    if (sf !== 'all') {
      const days = daysSinceScouted(f.id);
      if (sf === 'scouted' && days == null) return false;
      if (sf === 'never' && days != null) return false;
      if (sf === 'last7' && (days == null || days > 7)) return false;
      if (sf === 'last14' && (days == null || days > 14)) return false;
      if (sf === 'last30' && (days == null || days > 30)) return false;
      if (sf === 'stale' && (days == null || days <= 14)) return false;
    }
    if (state.acresMin != null && state.acresMin !== '' && f.acres < parseFloat(state.acresMin)) return false;
    if (state.acresMax != null && state.acresMax !== '' && f.acres > parseFloat(state.acresMax)) return false;
    // GDU range
    if ((state.gduMin != null && state.gduMin !== '') || (state.gduMax != null && state.gduMax !== '')) {
      const g = estimateCurrentGdu(f);
      if (g == null) return false;
      if (state.gduMin != null && state.gduMin !== '' && g < parseFloat(state.gduMin)) return false;
      if (state.gduMax != null && state.gduMax !== '' && g > parseFloat(state.gduMax)) return false;
    }
    // Growth stage filter (single stage or stage range like 'V6' or 'V-veg' or 'R-rep')
    const stf = state.stageFilter || 'all';
    if (stf !== 'all') {
      const stg = estimateCurrentStage(f);
      if (!stg) return false;
      if (stf === 'veg' && !stg.startsWith('V')) return false;
      if (stf === 'rep' && !stg.startsWith('R')) return false;
      if (stf.startsWith('V') || stf.startsWith('R')) {
        if (stg !== stf) return false;
      }
    }
    return true;
  });
  const sortBy = state.fieldsSort || 'name';
  result.sort((a, b) => {
    if (sortBy === 'name') return a.name.localeCompare(b.name);
    if (sortBy === 'name_desc') return b.name.localeCompare(a.name);
    if (sortBy === 'acres') return b.acres - a.acres;
    if (sortBy === 'acres_asc') return a.acres - b.acres;
    if (sortBy === 'planted') return (b.plantingDate || '').localeCompare(a.plantingDate || '');
    if (sortBy === 'planted_asc') return (a.plantingDate || '').localeCompare(b.plantingDate || '');
    if (sortBy === 'scouted') return ((lastScoutedDate(b.id) || '0000') + '').localeCompare((lastScoutedDate(a.id) || '0000') + '');
    if (sortBy === 'status') {
      const order = { action: 0, watch: 1, good: 2 };
      return (order[state.fieldStatuses[a.id] || 'good'] - order[state.fieldStatuses[b.id] || 'good']);
    }
    return 0;
  });
  return result;
}

function fieldRow(f) {

function ratingBar(val, scale) {
  if (val === null || val === undefined || val === '') return '<span class="rating-na">—</span>';
  const str = String(val).trim();
  // Strip preliminary marker for parsing but show it in the label
  const preliminary = str.endsWith('*');
  const clean = preliminary ? str.slice(0, -1) : str;
  // Letter codes (A, AA, BA, M etc.) — show as-is
  if (/^[A-Z]+$/i.test(clean)) return `<span class="rating-letter">${esc(str)}</span>`;
  // Slash range "3/4" — average
  let v;
  if (clean.includes('/')) {
    const parts = clean.split('/').map(p => parseFloat(p)).filter(n => !isNaN(n));
    v = parts.length ? (parts.reduce((a, b) => a + b, 0) / parts.length) : 0;
  } else {
    v = parseFloat(clean);
  }
  if (!v || isNaN(v)) return `<span class="rating-na">${esc(str)}</span>`;

  // Scale handling
  // 'dekalb' (default): 1=best, 9=worst → filled = 6 - v (clamped)
  // 'pioneer': 9=best, 1=worst → filled = v / 2 (rounded; 9/2≈5 full bars)
  let filled, cls;
  if (scale === 'pioneer') {
    // 9 → 5 bars green, 7 → 4 bars green, 5 → 3 bars amber, 3 → 2 bars rust, 1 → 1 bar rust
    filled = Math.max(0, Math.min(5, Math.round((v + 1) / 2)));
    cls = v >= 6 ? 'leaf' : v >= 4 ? 'amber' : 'rust';
  } else {
    // Dekalb scale: 1 best, 9 worst
    filled = Math.max(0, Math.min(5, Math.round(6 - v)));
    cls = v >= 4 ? 'rust' : v >= 2.5 ? 'amber' : 'leaf';
  }

  let html = '<div class="rating-bars">';
  for (let i = 1; i <= 5; i++) {
    html += `<div class="rating-bar ${i <= filled ? 'rb-' + cls : 'rb-off'}"></div>`;
  }
  html += `<span class="rating-val">${esc(str)}</span></div>`;
  return html;
}

// Follow alias chain (with cycle guard) and return an object containing the original record
// merged with the resolved record's metric fields. Original name/source/aliasOf are preserved.
function resolveHybridData(h) {
  if (!h) return h;
  const seen = new Set();
  let cur = h;
  while (cur && cur.aliasOf && !seen.has(cur.name)) {
    seen.add(cur.name);
    const target = state.hybrids.find(x => x.name === cur.aliasOf);
    if (!target) break;
    cur = target;
  }
  if (cur === h) return h;
  // Merge: keep h.name/aliasOf, but overlay all metric fields from cur
  const merged = Object.assign({}, cur, {
    name: h.name,
    aliasOf: h.aliasOf,
    source: h.source || cur.source,
    _aliasResolvedTo: cur.name,
  });
  return merged;
}

function hybridCard(h, opts) {
  opts = opts || {};
  const r = resolveHybridData(h);
  const plantedNames = new Set();
  state.fields.forEach(f => (f.plantings || []).forEach(p => {
    const n = state.hybridOverrides[p.hybridRaw] || p.matchedHybrid;
    if (n) plantedNames.add(n);
  }));
  const fieldsWith = plantedNames.has(h.name)
    ? state.fields.filter(f => (f.plantings || []).some(p => (state.hybridOverrides[p.hybridRaw] || p.matchedHybrid) === h.name)).length
    : 0;
  const needsBadge = opts.unmatched
    ? `<div class="hybrid-planted hybrid-needs">${opts.plantings} planting${opts.plantings > 1 ? 's' : ''} · ${opts.acres.toFixed(0)} ac</div>`
    : (fieldsWith > 0 ? `<div class="hybrid-planted">${fieldsWith} field${fieldsWith > 1 ? 's' : ''}</div>` : '');
  const aliasBadge = h.aliasOf ? `<span class="alias-badge" title="Metrics from ${esc(h.aliasOf)}">↳ ${esc(h.aliasOf)}</span>` : '';
  const sourceBadge = h.source ? `<span class="src-badge src-${esc((h.source || 'other').toLowerCase().replace(/[^a-z]/g, ''))}">${esc(h.source)}</span>` : '';
  const isEmpty = !r.rm && !r.drought_tolerance && !r.stalk_strength && !r.gdu_flower;
  return `
    <div class="hybrid-card${(opts.unmatched && isEmpty) ? ' hybrid-card-empty' : ''}${h.aliasOf ? ' hybrid-card-alias' : ''}">
      <button class="hybrid-card-delete" onclick="event.stopPropagation(); deleteHybrid('${esc(h.name)}')" title="Delete hybrid">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/></svg>
      </button>
      <div class="hybrid-card-body" onclick="openHybridDetail('${esc(h.name)}')">
        <div class="hybrid-card-head">
          <div>
            <div class="hybrid-name">${esc(h.name)} ${aliasBadge}</div>
            <div class="hybrid-badges">${sourceBadge}</div>
            <div class="hybrid-tagline">RM ${esc(r.rm || '—')} · ${esc(r.trait_package || '—')} · GDU ${esc(r.gdu_flower || '—')}/${esc(r.gdu_blacklayer || '—')}</div>
          </div>
          ${needsBadge}
        </div>
        <div class="hybrid-ratings">
          <div class="hr-row"><span class="hr-lbl">Drought</span> ${ratingBar(r.drought_tolerance)}</div>
          <div class="hr-row"><span class="hr-lbl">Stalks</span> ${ratingBar(r.stalk_strength)}</div>
          <div class="hr-row"><span class="hr-lbl">Roots</span> ${ratingBar(r.root_strength)}</div>
          <div class="hr-row"><span class="hr-lbl">Tar Spot</span> ${ratingBar(r.tar_spot)}</div>
        </div>
        <div class="hybrid-pop-strip">

}

function renderHybridList(q, mode, sourceFilter) {
  mode = mode || 'all';
  sourceFilter = sourceFilter || 'all';
  state.hybridSourceFilter = sourceFilter;
  if (mode === 'unmatched_plantings') return renderUnmatchedPlantings(q, sourceFilter);
  let list = state.hybrids;
  const plantedNames = new Set();
  state.fields.forEach(f => (f.plantings || []).forEach(p => {
    const name = state.hybridOverrides[p.hybridRaw] || p.matchedHybrid;
    if (name) plantedNames.add(name);
  }));
  if (mode === 'planted') list = list.filter(h => plantedNames.has(h.name));
  else if (mode === 'unplanted') list = list.filter(h => !plantedNames.has(h.name));
  if (sourceFilter !== 'all') list = list.filter(h => (h.source || 'Other') === sourceFilter);
  if (q) {
    const ql = q.toLowerCase();
    list = list.filter(h => (h.name || '').toLowerCase().includes(ql) || String(h.rm || '').includes(ql));
  }
  if (list.length === 0) return emptyState('No hybrids match', 'Try a different search or filter');
  list = list.slice().sort((a, b) => {
    const ra = parseFloat(a.rm) || 0, rb = parseFloat(b.rm) || 0;
    if (ra !== rb) return ra - rb;
    return (a.name || '').localeCompare(b.name || '');
  });
  return list.map(hybridCard).join('');
}

function renderUnmatchedPlantings(q, sourceFilter) {
  const items = {};
  state.fields.forEach(f => {
    (f.plantings || []).forEach(p => {
      if (state.hybridOverrides[p.hybridRaw]) return;
      if (p.matchStatus === 'unknown' || p.matchStatus === 'ambiguous' || !p.matchedHybrid) {
        const key = p.hybridRaw || '(blank)';
        if (!items[key]) items[key] = { hybridRaw: key, fields: [], totalAcres: 0, count: 0 };
        items[key].fields.push({ id: f.id, name: f.name, acres: p.acres || 0 });
        items[key].totalAcres += (p.acres || 0);
        items[key].count++;
      }
    });
  });
  let list = Object.values(items).sort((a, b) => b.totalAcres - a.totalAcres);
  if (q) {
    const ql = q.toLowerCase();
    list = list.filter(it => it.hybridRaw.toLowerCase().includes(ql));
  }
  if (list.length === 0) return emptyState('All plantings matched', 'Every planting links to a hybrid in the library');
  // Ensure each unmatched name has a placeholder in state.hybrids so Edit works.
  list.forEach(it => {
    if (!state.hybrids.find(h => h.name === it.hybridRaw)) {
      state.hybrids.push({
        name: it.hybridRaw, source: 'Manual', rating_scale: 'dekalb',
        trait_package: '', rm: null,
      });
    }
  });
  // Apply source filter after placeholders exist
  if (sourceFilter && sourceFilter !== 'all') {
    list = list.filter(it => {
      const h = state.hybrids.find(x => x.name === it.hybridRaw);
      return h && (h.source || 'Other') === sourceFilter;
    });
    if (list.length === 0) return emptyState('No unmatched plantings match supplier filter', '');
  }
  return list.map(it => {
    const h = state.hybrids.find(x => x.name === it.hybridRaw);
    return hybridCard(h, { unmatched: true, acres: it.totalAcres, plantings: it.count });
  }).join('');
}

// Render the Leaflet map after the view paints. Only shows fields that pass the active filters.
function mountLeafletMap() {
  const container = document.getElementById('leafletMap');
  if (!container || !window.L) return;
  if (state._leafletMap) { try { state._leafletMap.remove(); } catch(e){} state._leafletMap = null; }
  const map = L.map('leafletMap', { zoomControl: true }).setView([41.95, -93.65], 11);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 19, attribution: 'Esri World Imagery',
  }).addTo(map);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 19, opacity: 0.7,
  }).addTo(map);
  state._leafletMap = map;

  const visibleFields = filterFields();
  const visibleIds = new Set(visibleFields.map(f => f.id));
  const showLabels = state.mapShowLabels !== false;
  const colorFor = status => ({ good: '#3a7a3a', watch: '#d68910', action: '#c0392b' }[status] || '#888');
  const bounds = [];

  // Draw visible (filtered) fields first, in full color
  visibleFields.forEach(f => {
    const b = state.fieldBoundaries[f.id];
    if (!b || !b.coords || b.coords.length < 3) return;
    const status = state.fieldStatuses[f.id] || 'good';
    const color = colorFor(status);
    const poly = L.polygon(b.coords, {
      color: color, weight: 2, fillColor: color, fillOpacity: 0.45,
    }).addTo(map);
    poly.on('mouseover', () => poly.setStyle({ weight: 4, fillOpacity: 0.65 }));
    poly.on('mouseout', () => poly.setStyle({ weight: 2, fillOpacity: 0.45 }));
    poly.on('click', () => openFieldDetail(f.id));
    if (showLabels) {
      const hybridShort = f.isTrial ? `${f.plantings.length} varieties` : (f.hybrid || '');
      L.tooltip({ permanent: true, direction: 'center', className: 'field-label' })
        .setLatLng(poly.getBounds().getCenter())
        .setContent(`<strong>${esc(f.name)}</strong><br>${f.acres.toFixed(1)} ac${hybridShort ? '<br>' + esc(hybridShort) : ''}`)
        .addTo(map);
    }
    bounds.push(poly.getBounds());
  });

  // Draw filtered-out fields dimmed for context (only if filters are active)
  const hasActiveFilters = state.search || state.statusFilter !== 'all' || state.trialFilter !== 'all' || (state.brandFilter && state.brandFilter !== 'all') || state.cropFilter !== 'all' || state.growerFilter !== 'all' || (state.reportsFilter && state.reportsFilter !== 'all') || (state.scoutedFilter && state.scoutedFilter !== 'all') || state.acresMin || state.acresMax || (state.stageFilter && state.stageFilter !== 'all') || state.gduMin || state.gduMax;
  if (hasActiveFilters) {
    Object.keys(state.fieldBoundaries).forEach(fid => {
      if (visibleIds.has(fid)) return;
      const b = state.fieldBoundaries[fid];
      if (!b || !b.coords || b.coords.length < 3) return;
      L.polygon(b.coords, {
        color: '#777', weight: 1, fillColor: '#777', fillOpacity: 0.08, dashArray: '4,4', interactive: false,
      }).addTo(map);
    });
  }

  if (bounds.length) {
    const merged = bounds.reduce((acc, b) => acc.extend(b), bounds[0]);
    map.fitBounds(merged, { padding: [30, 30] });
  }
}

function csvEscape(v) {
  if (v == null) return '';
  const s = String(v);
  if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

  const reports = state.reports.filter(r => reportIds.includes(r.id));
  if (reports.length === 0) { toast('No reports to export'); return; }
  // Column order — flatten the nested report structure into rows
  const headers = [
    'Date', 'Field', 'Grower', 'Acres', 'Scout', 'Growth Stage', 'Weather', 'Health Score',
    'Priority', 'Recommended Action', 'Rec Product', 'Rec Timing', 'Rescout In',
    'Stand Population', 'Stand Uniformity', 'Stand Root Health', 'Stand Emergence',
    'Weed Species', 'Weed Density', 'Weed Stage', 'Weed Severity', 'Weed Resistant',
    'Insect Pest', 'Insect Count', 'Insect Threshold', 'Insect Notes',
    'Disease', 'Disease Severity', 'Disease Location', 'Disease Risk',
    'Nutrient Deficiency', 'Compaction', 'Moisture', 'Environmental Stress',
    'Ponding', 'Erosion', 'Storm Damage', 'Tile Issues',
  ];
  const rows = reports.map(r => {
    const f = state.fields.find(x => x.id === r.fieldId);
    return [
      r.date, r.fieldName || (f ? f.name : ''), f ? f.grower : '', f ? f.acres : '',

/* ============ GDU STAGE ESTIMATOR ============ */
// Vegetative stages as fraction of GDU to VT (tassel). Source: corn staging curve.
const GDU_STAGES_V = [
  { stage: 'VE', frac: 0.10, label: 'Emergence' },
  { stage: 'V2', frac: 0.16, label: '2-leaf' },
  { stage: 'V4', frac: 0.27, label: '4-leaf' },
  { stage: 'V6', frac: 0.37, label: '6-leaf' },
  { stage: 'V8', frac: 0.51, label: '8-leaf' },
  { stage: 'V10', frac: 0.62, label: '10-leaf' },
  { stage: 'V12', frac: 0.75, label: '12-leaf' },
  { stage: 'V14', frac: 0.87, label: '14-leaf' },
  { stage: 'VT', frac: 1.00, label: 'Tassel' },
];
// Reproductive stages as GDU added past VT (from ChatGPT staging curve).
// R6 uses the hybrid's actual gdu_blacklayer when available, otherwise VT + 1200.
const GDU_STAGES_R = [
  { stage: 'R1', addedFromVT: 75,  label: 'Silking' },
  { stage: 'R2', addedFromVT: 325, label: 'Blister' },
  { stage: 'R3', addedFromVT: 525, label: 'Milk' },
  { stage: 'R4', addedFromVT: 725, label: 'Dough' },
  { stage: 'R5', addedFromVT: 925, label: 'Dent' },
];

// Resolve "GDU to tassel" for a hybrid. Dekalb sheets give gdu_flower (silk) which is ~75 GDU past VT.
// Pioneer guides give Crop Heat Units (CHU) — convert CHU≈GDU * 1.8 (rough). We accept either.
function gduToTassel(h) {
  if (!h) return null;
  // Resolve through alias chain
  const r = resolveHybridData(h);
  if (r.gdu_flower) {
    const v = parseFloat(r.gdu_flower);
    if (!isNaN(v)) return Math.max(800, v - 75); // back off silking ~75 GDU to VT
  }
  if (r.crop_heat_units) {
    const v = parseFloat(r.crop_heat_units);
    if (!isNaN(v)) return Math.round(v * 0.56); // CHU → GDU rough conversion
  }
  // Fallback: if RM is present, estimate GDU to VT as RM * ~14
  if (r.rm) {
    const v = parseFloat(r.rm);
    if (!isNaN(v)) return Math.round(v * 14);
  }
  return null;
}

function buildStageTable(h) {
  const vt = gduToTassel(h);
  if (!vt) return null;
  const r = resolveHybridData(h);
  const bl = r.gdu_blacklayer ? parseFloat(r.gdu_blacklayer) : null;
  const blGdu = (bl && !isNaN(bl)) ? bl : vt + 1200;
  const rows = [];
  GDU_STAGES_V.forEach(s => rows.push({ stage: s.stage, label: s.label, gdu: Math.round(vt * s.frac) }));
  GDU_STAGES_R.forEach(s => rows.push({ stage: s.stage, label: s.label, gdu: Math.round(vt + s.addedFromVT) }));
  rows.push({ stage: 'R6', label: 'Black layer', gdu: Math.round(blGdu) });
  return { vt: Math.round(vt), bl: Math.round(blGdu), rows };
}

function findStageForGdu(stageTable, accumulatedGdu) {
  if (!stageTable || accumulatedGdu == null) return null;
  const rows = stageTable.rows;
  let current = null, next = null;
  for (let i = 0; i < rows.length; i++) {
    if (rows[i].gdu <= accumulatedGdu) {
      current = rows[i];
      next = rows[i + 1] || null;
    } else { next = rows[i]; break; }
  }
  if (!current) current = { stage: 'Pre-VE', label: 'Not yet emerged', gdu: 0 };
  return { current, next, gduRemaining: next ? next.gdu - accumulatedGdu : 0 };
}

/* ============ WEATHER (Open-Meteo) ============ */
// Returns accumulated GDU base 50, ceiling 86 from planting date through today.
// Uses Open-Meteo historical+forecast endpoint. lat/lng default to Ames, IA if missing.
async function fetchAccumulatedGdu(plantingDate, lat, lng) {
  if (!plantingDate) return null;
  lat = lat || 42.03;  // Ames default
  lng = lng || -93.62;
  const start = plantingDate;
  const end = new Date().toISOString().slice(0, 10);
  const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lng}&start_date=${start}&end_date=${end}&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=America%2FChicago`;
  try {
    const res = await fetch(url);
    if (!res.ok) {
      // Archive endpoint only has data up to ~5 days ago. For more recent dates, use forecast endpoint.
      return await fetchGduForecast(plantingDate, lat, lng);
    }
    const data = await res.json();
    const max = data.daily?.temperature_2m_max || [];
    const min = data.daily?.temperature_2m_min || [];
    let total = 0, days = 0;
    for (let i = 0; i < max.length; i++) {
      if (max[i] == null || min[i] == null) continue;
      const tmax = Math.min(max[i], 86);
      const tmin = Math.max(min[i], 50);
      const gdu = Math.max(0, ((tmax + tmin) / 2) - 50);
      total += gdu; days++;
    }
    return { gdu: Math.round(total), days, source: 'Open-Meteo archive' };
  } catch (err) {
    console.warn('GDU fetch failed', err);
    return null;
  }
}

async function fetchGduForecast(plantingDate, lat, lng) {
  // Forecast endpoint covers recent past + future
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=America%2FChicago&past_days=92`;
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    const dates = data.daily?.time || [];
    const max = data.daily?.temperature_2m_max || [];
    const min = data.daily?.temperature_2m_min || [];
    const today = new Date().toISOString().slice(0, 10);
    let total = 0, days = 0;
    for (let i = 0; i < dates.length; i++) {
      if (dates[i] < plantingDate || dates[i] > today) continue;
      if (max[i] == null || min[i] == null) continue;
      const tmax = Math.min(max[i], 86);
      const tmin = Math.max(min[i], 50);
      total += Math.max(0, ((tmax + tmin) / 2) - 50);
      days++;
    }
    return { gdu: Math.round(total), days, source: 'Open-Meteo forecast' };
  } catch (err) {
    return null;
  }
}

// Get a centroid lat/lng for a field if it has a boundary
function fieldCentroid(f) {
  const b = state.fieldBoundaries[f.id];
  if (!b || !b.coords || b.coords.length === 0) return null;
  let lat = 0, lng = 0;
  b.coords.forEach(([la, ln]) => { lat += la; lng += ln; });
  return { lat: lat / b.coords.length, lng: lng / b.coords.length };
}

async function populateGduStagePanel(f) {
  const panel = document.getElementById('gdu-stage-panel-' + f.id);
  if (!panel) return;
  if (!f.plantingDate) {
    panel.innerHTML = '<div class="muted">No planting date — set one to enable stage estimates.</div>';
    return;
  }
  // Pick a representative hybrid: matched one from first planting (resolved)
  const firstPlanting = (f.plantings || []).find(p => p.matchedHybrid || state.hybridOverrides[p.hybridRaw]);
  let h = null;
  if (firstPlanting) {
    const name = state.hybridOverrides[firstPlanting.hybridRaw] || firstPlanting.matchedHybrid;
    h = state.hybrids.find(x => x.name === name);
  }
  const stageTable = h ? buildStageTable(h) : null;
  // Get centroid from boundary if present
  const centroid = fieldCentroid(f);
  const lat = centroid?.lat;
  const lng = centroid?.lng;
  const locLabel = centroid ? 'field boundary centroid' : 'Ames, IA (no boundary)';
  // Fetch
  const result = await fetchAccumulatedGdu(f.plantingDate, lat, lng);
  if (!result) {
    panel.innerHTML = '<div class="muted">Could not fetch weather data. Check connection.</div>';
    return;
  }
  if (!stageTable) {
    panel.innerHTML = `
      <div class="gdu-now">
        <div class="gdu-now-val">${result.gdu.toLocaleString()} <span class="gdu-now-unit">GDU</span></div>
        <div class="gdu-now-lbl">accumulated since ${fmtDate(f.plantingDate)} · ${result.days} days · ${locLabel}</div>
      </div>
      <div class="muted" style="font-size:12px; margin-top:8px;">Hybrid GDU data missing — add GDU to Flower in hybrid library to estimate growth stage.</div>
    `;
    return;
  }
  const sf = findStageForGdu(stageTable, result.gdu);
  panel.innerHTML = `
    <div class="gdu-now">
      <div class="gdu-now-stage">${sf.current.stage} · ${esc(sf.current.label)}</div>
      <div class="gdu-now-val">${result.gdu.toLocaleString()} <span class="gdu-now-unit">GDU</span></div>
      <div class="gdu-now-lbl">accumulated since ${fmtDate(f.plantingDate)} · ${result.days} days · ${locLabel}</div>
      ${sf.next ? `<div class="gdu-next">Next: <strong>${sf.next.stage}</strong> at ${sf.next.gdu.toLocaleString()} GDU (${sf.gduRemaining.toLocaleString()} more · ~${Math.round(sf.gduRemaining / 22)} days at 22 GDU/day)</div>` : '<div class="gdu-next">Past R6 — black layer reached</div>'}
    </div>
    <details class="gdu-details">
      <summary>Full stage timeline for ${esc(h.name)}</summary>
      <div class="gdu-stage-grid" style="margin-top:10px;">
        ${stageTable.rows.map(r => `
          <div class="gs-cell ${r.stage === sf.current.stage ? 'gs-current' : (r.gdu < result.gdu ? 'gs-past' : 'gs-future')} ${r.stage.startsWith('R') ? 'gs-rep' : 'gs-veg'}">
            <div class="gs-stage">${r.stage}</div>
            <div class="gs-label">${esc(r.label)}</div>
            <div class="gs-gdu">${r.gdu.toLocaleString()}</div>
          </div>
        `).join('')}
      </div>
    </details>
  `;
}

// Resolve a raw hybrid string to a library hybrid record. Honors user overrides first.
function resolveHybrid(rawStr, fallbackMatched) {
  if (!rawStr) return { hybrid: null, status: 'unknown' };
  // Override map wins
  if (state.hybridOverrides[rawStr]) {
    const h = state.hybrids.find(x => x.name === state.hybridOverrides[rawStr]);
    if (h) return { hybrid: h, status: 'confirmed' };
  }
  // Use the pre-computed matchedHybrid from bootstrap if present
  if (fallbackMatched) {
    const h = state.hybrids.find(x => x.name === fallbackMatched);
    if (h) return { hybrid: h, status: 'matched' };
  }
  return { hybrid: null, status: 'unknown' };
}

function confirmHybridMatch(fid, plantingIdx, hybridName) {
  const f = state.fields.find(x => x.id === fid);
  if (!f) return;
  const p = f.plantings[plantingIdx];
  if (!p) return;
  state.hybridOverrides[p.hybridRaw] = hybridName;
  // Also update the planting record so the UI reflects it without a re-bootstrap
  p.matchedHybrid = hybridName;
  p.matchStatus = 'exact';
  closeModal();
  toast(`Confirmed: ${p.hybridRaw} → ${hybridName}`);
  openFieldDetail(fid);
  render();
}

function clearHybridMatch(fid, plantingIdx) {
  const f = state.fields.find(x => x.id === fid);
  if (!f) return;
  const p = f.plantings[plantingIdx];
  if (!p) return;
  delete state.hybridOverrides[p.hybridRaw];
  p.matchedHybrid = null;
  p.matchStatus = 'unknown';
  closeModal();
  toast('Match cleared');
  openFieldDetail(fid);
}

// Simple similarity score (0..1) — normalized substring + Dice coefficient on bigrams
function similarityScore(a, b) {
  if (!a || !b) return 0;
  const norm = s => String(s).toUpperCase().replace(/[\(\)\.\s]/g, '').replace(/[^A-Z0-9]/g, '');
  const an = norm(a), bn = norm(b);
  if (!an || !bn) return 0;
  if (an === bn) return 1;
  // strip common trait suffixes including trailing T
  const stripTrait = s => s.replace(/(VT4PRIB|VT4P|VT2PRIB|VT2P|TRE|SSPRORIB|SSRIB|SSPRIB|SSPRO|SSXP|SSX|RIB|PRO|T)+$/, '');
  const ans = stripTrait(an), bns = stripTrait(bn);
  if (ans && ans === bns) return 0.95;
  const bigrams = s => { const r = new Set(); for (let i = 0; i < s.length - 1; i++) r.add(s.slice(i, i+2)); return r; };
  const A = bigrams(ans), B = bigrams(bns);
  if (A.size + B.size === 0) return 0;
  let inter = 0;
  for (const x of A) if (B.has(x)) inter++;
  return (2 * inter) / (A.size + B.size);
}

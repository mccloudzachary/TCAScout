function openHybridEditor(name) {
  const h = state.hybrids.find(x => x.name === name);
  if (!h) return;
  const others = state.hybrids
    .filter(x => x.name !== name && x.name && !x.name.startsWith('__NEW_HYBRID_') && !x.aliasOf)
    .slice()
    .sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  let dropdownHtml;
  if (h.aliasOf) {
    dropdownHtml = `
      <div class="link-existing-panel link-existing-active">
        <div class="link-existing-label">
          <strong>↳ Linked to: ${esc(h.aliasOf)}</strong>
          <span class="muted">All metrics on this hybrid are inherited from <strong>${esc(h.aliasOf)}</strong>. Plantings and acreage stay on this entry. To edit the shared data, open ${esc(h.aliasOf)} directly.</span>
        </div>
        <div class="link-existing-controls">
          <button class="btn btn-ghost" onclick="unlinkHybrid('${esc(name)}')">Unlink</button>
          <button class="btn btn-primary" onclick="closeModal(); openHybridDetail('${esc(h.aliasOf)}')">Open ${esc(h.aliasOf)}</button>
        </div>
      </div>
    `;
  } else {
    dropdownHtml = `
      <div class="link-existing-panel">
        <div class="link-existing-label">
          <strong>Already have data for this hybrid?</strong>
          <span class="muted">Link this entry to an existing hybrid — the metric data (RM, GDU, ratings, populations) will be inherited from that hybrid. This entry keeps its own name, plantings, and acreage. Edits to the linked hybrid sync here automatically.</span>
        </div>
        <div class="link-existing-controls">
          <select id="he_linkTo" class="filter-select" style="flex:1;">
            <option value="">— Pick an existing hybrid —</option>
            ${others.map(o => `<option value="${esc(o.name)}">${esc(o.name)}${o.rm ? ' · RM ' + esc(o.rm) : ''}${o.trait_package ? ' · ' + esc(o.trait_package) : ''}</option>`).join('')}
          </select>
          <button class="btn btn-primary" onclick="linkToExistingHybrid('${esc(name)}')">Link</button>
        </div>
      </div>
    `;
  }
  const fieldHtml = HYBRID_FIELDS.map(f => {
    const val = h[f.key] == null ? '' : h[f.key];
    let control;
    if (f.type === 'select') {
      const opts = f.options.map(o => `<option value="${esc(o)}" ${val === o ? 'selected' : ''}>${esc(o)}</option>`).join('');
      control = `<select class="filter-select" id="he_${f.key}" ${h.aliasOf && f.key !== 'name' && f.key !== 'source' ? 'disabled' : ''}><option value="">— None —</option>${opts}</select>`;
    } else {
      control = `<input type="${f.type}" id="he_${f.key}" value="${esc(val)}" placeholder="${esc(f.placeholder || '')}" ${h.aliasOf && f.key !== 'name' && f.key !== 'source' ? 'disabled' : ''}/>`;
    }
    return `<div class="form-field"><label>${esc(f.label)}${f.required ? ' *' : ''}</label>${control}</div>`;
  }).join('');
  const dataSectionTitle = h.aliasOf
    ? `<div class="link-divider"><span>This hybrid's own data (currently overridden by link — unlink to edit)</span></div>`
    : `<div class="link-divider"><span>OR edit this hybrid's own data</span></div>`;
  openModal(`
    <div class="modal-head">
      <div>
        <div class="modal-title">Edit Hybrid</div>
        <div class="modal-sub">${esc(h.name)}${h.aliasOf ? ' · linked to ' + esc(h.aliasOf) : ' · changes save to your library and sync everywhere'}</div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      ${dropdownHtml}
      ${dataSectionTitle}
      <div class="form-grid">${fieldHtml}</div>
      <div class="muted" style="margin-top:14px; font-size:12px;">Rating convention: 1 = best, 9 = worst. Letter codes (A, AA, BA) or slash ranges (3/4) are fine. Leave blank for unknown.</div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="openHybridDetail('${esc(name)}')">Cancel</button>
      <button class="btn btn-rust" onclick="deleteHybrid('${esc(name)}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/></svg> Delete</button>
      <button class="btn btn-primary" onclick="saveHybridEdits('${esc(name)}')">Save Edits</button>
    </div>
  `);
}

// Set aliasOf so this hybrid inherits metrics from the target while keeping its own
// name, plantings, acres, and trial-location context intact.
function linkToExistingHybrid(fromName) {
  const sel = document.getElementById('he_linkTo');
  if (!sel || !sel.value) { toast('Pick a hybrid from the dropdown first'); return; }
  const toName = sel.value;
  if (fromName === toName) { toast('Cannot link a hybrid to itself'); return; }
  const target = state.hybrids.find(x => x.name === toName);
  if (!target) { toast('Target hybrid not found'); return; }
  // Cycle guard: don't allow A → B if B already aliases back to A (directly or via chain)
  const seen = new Set();
  let walker = target;
  while (walker && walker.aliasOf && !seen.has(walker.name)) {
    seen.add(walker.name);
    if (walker.aliasOf === fromName) { toast('That would create a circular link'); return; }
    walker = state.hybrids.find(x => x.name === walker.aliasOf);
  }
  const fromH = state.hybrids.find(x => x.name === fromName);
  if (!fromH) return;
  fromH.aliasOf = toName;
  closeModal();
  toast(`Linked ${fromName} → ${toName} (metrics will sync from ${toName})`);
  render();
}

function unlinkHybrid(name) {
  const h = state.hybrids.find(x => x.name === name);
  if (!h || !h.aliasOf) return;
  delete h.aliasOf;
  closeModal();
  toast(`Unlinked ${name}`);
  render();
}

function saveHybridEdits(originalName) {
  const h = state.hybrids.find(x => x.name === originalName);
  if (!h) return;
  HYBRID_FIELDS.forEach(f => {
    const el = document.getElementById('he_' + f.key);
    if (!el) return;
    const v = el.value.trim();
    h[f.key] = v === '' ? null : v;
  });
  if (!h.name) { toast('Name is required'); return; }
  // If name changed, update any planting overrides pointing at the old name
  if (h.name !== originalName) {
    Object.keys(state.hybridOverrides).forEach(k => {
      if (state.hybridOverrides[k] === originalName) state.hybridOverrides[k] = h.name;
    });
    state.fields.forEach(f => (f.plantings || []).forEach(p => {
      if (p.matchedHybrid === originalName) p.matchedHybrid = h.name;
    }));
  }
  closeModal();
  toast('Hybrid saved');
  render();
}

function deleteField(fid) {
  const f = state.fields.find(x => x.id === fid);
  if (!f) return;
  const reportCount = state.reports.filter(r => r.fieldId === fid).length;
  const warn = `Delete field "${f.name}" (${f.acres.toFixed(1)} ac)?` + (reportCount ? `\n\nThis will also delete ${reportCount} scouting report${reportCount > 1 ? 's' : ''} tied to this field.` : '');
  if (!confirm(warn)) return;
  state.fields = state.fields.filter(x => x.id !== fid);
  state.reports = state.reports.filter(r => r.fieldId !== fid);
  delete state.fieldStatuses[fid];
  delete state.fieldBoundaries[fid];
  closeModal();
  toast(`Deleted ${f.name}`);
  render();
}

function deleteHybrid(name) {
  if (!confirm(`Delete "${name}" from the library? Any plantings matched to it become unmatched, and any hybrids linked to it will be unlinked.`)) return;
  state.hybrids = state.hybrids.filter(h => h.name !== name);
  // Drop alias pointers to the deleted hybrid
  state.hybrids.forEach(h => { if (h.aliasOf === name) delete h.aliasOf; });
  state.fields.forEach(f => (f.plantings || []).forEach(p => {
    if (p.matchedHybrid === name) { p.matchedHybrid = null; p.matchStatus = 'unknown'; }
  }));
  Object.keys(state.hybridOverrides).forEach(k => {
    if (state.hybridOverrides[k] === name) delete state.hybridOverrides[k];
  });
  // Close modal if one is open
  const bd = document.getElementById('modalBackdrop');
  if (bd && bd.classList.contains('active')) closeModal();
  toast(`Deleted ${name}`);
  render();
}

function getAISuggestion(f, dap) {
  if (!f.plantingDate) return 'Set a planting date to get growth-stage suggestions.';
  if (dap < 0) return `Planting scheduled in ${Math.abs(dap)} days. Verify hybrid placement and population target.`;
  if (dap < 14) return `Stand establishment phase (${dap} DAP). Scout for emergence uniformity, seedling vigor, and early crusting. Watch for cutworm and wireworm.`;
  if (dap < 30) return `V2–V4 growth (${dap} DAP). Critical post-emerge weed window. Check for early-season insect pressure (black cutworm). Verify population vs. target.`;
  if (dap < 60) return `V6–V10 (${dap} DAP). Sidedress N timing decision. Monitor for European corn borer, rootworm beetles. Begin disease scouting for early NCLB / GLS.`;
  if (dap < 90) return `VT–R1 (${dap} DAP). Pollination window. Fungicide decision point: assess GLS, NCLB, Southern Rust, and Tar Spot pressure. Hybrid disease ratings matter here.`;
  if (dap < 120) return `R2–R4 (${dap} DAP). Grain fill. Monitor stalk integrity, late-season disease progression, and any greensnap or lodging risk.`;
  return `Late-season / R5–R6 (${dap} DAP). Stalk push tests recommended. Plan harvest order by lodging risk and dry-down.`;
}

function compressImage(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round(height * (maxDim / width));
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round(width * (maxDim / height));
          height = maxDim;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function exportReportPDF(rid) {

    const imgData = canvas.toDataURL('image/png');
    const pdf = new jsPDF('p', 'mm', 'letter');
    const pdfW = pdf.internal.pageSize.getWidth();
    const pdfH = pdf.internal.pageSize.getHeight();
    const imgW = pdfW - 20;
    const imgH = (canvas.height * imgW) / canvas.width;
    let heightLeft = imgH;
    let position = 10;
    pdf.addImage(imgData, 'PNG', 10, position, imgW, imgH);
    heightLeft -= (pdfH - 20);
    while (heightLeft > 0) {
      position = heightLeft - imgH + 10;
      pdf.addPage();
      pdf.addImage(imgData, 'PNG', 10, position, imgW, imgH);
      heightLeft -= (pdfH - 20);
    }
    const fname = `FieldScout_${r.fieldName.replace(/[^a-z0-9]/gi, '_')}_${r.date}.pdf`;
    pdf.save(fname);
    toast('PDF downloaded');
  }).catch(err => {

function handlePlantingFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array', cellDates: false });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
      let added = 0, updated = 0;
      rows.forEach(row => {
        // Flexible column matching
        const get = (...keys) => {
          for (const k of keys) {
            const found = Object.keys(row).find(rk => rk.toLowerCase().replace(/[^a-z0-9]/g, '') === k.toLowerCase().replace(/[^a-z0-9]/g, ''));
            if (found && row[found] !== '' && row[found] != null) return row[found];
          }
          return '';
        };
        const name = String(get('Field', 'FieldName', 'Field Name') || '').trim();
        if (!name) return;
        let date = get('Date Planted', 'DatePlanted', 'PlantingDate', 'Date');
        if (typeof date === 'number') {
          const d = XLSX.SSF.parse_date_code(date);
          if (d) date = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
        } else if (date) {
          date = String(date).slice(0, 10);
        }
        const existing = state.fields.find(f => f.name.toLowerCase() === name.toLowerCase());
        if (existing) {
          existing.acres = parseFloat(get('Acres')) || existing.acres;
          existing.hybrid = String(get('Hybrid', 'Variety') || existing.hybrid);
          existing.plantingDate = date || existing.plantingDate;
          existing.population = Math.round(parseFloat(get('Population', 'Seeding: Population (seeds/ac)', 'PopulationTarget')) || existing.population);
          existing.rowSpacing = parseInt(get('Row Spacing', 'RowSpacing')) || existing.rowSpacing;
          existing.prevCrop = String(get('Previous Crop', 'PreviousCrop', 'PrevCrop') || existing.prevCrop);
          updated++;
        } else {
          const f = {
            id: uid('f'),
            grower: String(get('Grower', 'GrowerName') || 'HF Farms'),
            farm: String(get('Farm', 'FarmName') || 'Panorama'),
            name: name,
            acres: parseFloat(get('Acres')) || 0,
            crop: String(get('Crop') || 'Corn'),
            hybrid: String(get('Hybrid', 'Variety') || ''),
            plantingDate: date || '',
            prevCrop: String(get('Previous Crop', 'PreviousCrop', 'PrevCrop') || 'Soybeans'),
            population: Math.round(parseFloat(get('Population', 'Seeding: Population (seeds/ac)', 'PopulationTarget')) || 0),
            rowSpacing: parseInt(get('Row Spacing', 'RowSpacing')) || 30,
            soil: String(get('Soil', 'SoilType') || ''),
            notes: '',
          };
          state.fields.push(f);
          state.fieldStatuses[f.id] = 'good';
          // Auto-create grower if new
          if (!state.growers.find(g => g.name === f.grower)) {
            state.growers.push({ id: uid('g'), name: f.grower, farms: [f.farm], contact: '', notes: '' });
          }
          added++;
        }
      });
      toast(`Imported: ${added} new, ${updated} updated`);
      render();
    } catch (err) {
      console.error(err);
      toast('Import failed: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function handleSeedFile(file) {
  if (!file) return;
  const ext = (file.name.split('.').pop() || '').toLowerCase();
  if (ext === 'pdf') {

  } else if (['xlsx', 'xls', 'csv'].includes(ext)) {
    handleSeedExcel(file);
  } else {
    toast('Unsupported file type. Use .xlsx, .csv, or .pdf');
  }

// Heuristic format detection: looks at column headers / data shape to determine source company
function detectSeedFormat(rows, textBlob) {
  const haystack = (textBlob || JSON.stringify(rows).slice(0, 3000)).toUpperCase();
  if (/PIONEER|DUPONT|OPTIMUM AQUAMAX|LUMIVIA|AQUAMAX|LUMIGEN/.test(haystack)) return 'pioneer';
  if (/DEKALB|DKC|SMARTSTAX|VT2P|VT4P|TRECEPTA|SS RIB|GDU.*FLOWER/.test(haystack)) return 'dekalb';
  return 'generic';
}

function handleSeedExcel(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '', header: 1 });
      const fmt = detectSeedFormat(rows, JSON.stringify(rows.slice(0, 5)));
      let added = 0, updated = 0;
      if (fmt === 'dekalb' || fmt === 'generic') {
        ({ added, updated } = parseDekalbRows(rows));
      } else if (fmt === 'pioneer') {
        ({ added, updated } = parsePioneerRows(rows));
      }
      toast(`${fmt[0].toUpperCase()+fmt.slice(1)} format: ${added} new, ${updated} updated`);
      // Recompute hybrid matches on all plantings using new library
      rematchAllPlantings();
      render();
    } catch (err) {
      console.error(err);
      toast('Excel import failed: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function handleSeedPdf(file) {
  if (!window.pdfjsLib) { toast('PDF library still loading — try again in a moment'); return; }
  toast('Reading PDF…');
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const typedarray = new Uint8Array(e.target.result);
      const pdf = await window.pdfjsLib.getDocument({ data: typedarray }).promise;
      let fullText = '';
      const lines = [];
      for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const tc = await page.getTextContent();
        // Reconstruct lines by grouping by Y position (within tolerance)
        const items = tc.items.map(it => ({ str: it.str, x: it.transform[4], y: it.transform[5] }));
        // Group by y rounded to nearest 3 units
        const byY = {};
        items.forEach(it => {
          const ky = Math.round(it.y / 3) * 3;
          if (!byY[ky]) byY[ky] = [];
          byY[ky].push(it);
        });
        // Sort each line's items by X and join with space
        Object.keys(byY).sort((a, b) => parseFloat(b) - parseFloat(a)).forEach(ky => {
          const line = byY[ky].sort((a, b) => a.x - b.x).map(it => it.str).join(' ').replace(/\s+/g, ' ').trim();
          if (line) {
            lines.push(line);
            fullText += line + '\n';
          }
        });
      }
      const fmt = detectSeedFormat([], fullText);
      let added = 0, updated = 0;
      if (fmt === 'pioneer') {
        ({ added, updated } = parsePioneerPdfLines(lines));
      } else if (fmt === 'dekalb') {
        ({ added, updated } = parseDekalbPdfLines(lines));
      } else {
        toast('Could not detect a known seed-guide format in this PDF');
        return;
      }
      toast(`${fmt[0].toUpperCase()+fmt.slice(1)} PDF: ${added} new, ${updated} updated`);
      rematchAllPlantings();
      render();
    } catch (err) {
      console.error(err);
      toast('PDF parse failed: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// Pioneer PDF row parser — matches the format from the 2026 product guide
function parsePioneerPdfLines(lines) {
  let added = 0, updated = 0;
  // A valid Pioneer product line starts with optional "NEW", then a product code like P\d... or P0... 
  // followed by an optional tech segment word, then a long string of numbers.
  const productRe = /^(NEW\s+)?(P\d[A-Z\d]+)\s+(.+)$/i;
  for (const line of lines) {
    const m = line.match(productRe);
    if (!m) continue;
    const isNew = !!m[1];
    const name = m[2];
    const rest = m[3].trim();
    // Tech segment can include "Conventional" or "AQ" as standalone words
    const tokens = rest.split(/\s+/);
    let extras = [];
    let nums = [];
    let techFromSuffix = '';
    for (const sfx of ['AML', 'AM', 'PCE', 'Q', 'V', 'AQ']) {
      if (name.endsWith(sfx)) { techFromSuffix = sfx; break; }
    }
    tokens.forEach(t => {
      if (t === 'Conventional' || t === 'AQ') extras.push(t);
      else nums.push(t.endsWith('*') ? t : t);
    });
    if (nums.length < 6) continue; // too few numbers, probably not a data row
    const tech = [techFromSuffix, ...extras].filter(Boolean).join(' ');
    while (nums.length < 20) nums.push(null);
    const rec = {
      name: name, source: 'Pioneer', is_new: isNew, trait_package: tech,
      rating_scale: 'pioneer',
      crop_heat_units: nums[0], rm: nums[1], silk_crm: nums[2], physiological_crm: nums[3],
      stalk_strength: nums[4], brittle_stalk: nums[5], root_strength: nums[6],
      emergence: nums[7], drought_tolerance: nums[8], staygreen: nums[9],
      drydown: nums[10], test_weight: nums[11], plant_height: nums[12],
      ear_placement: nums[13], husk_cover: nums[14],
      gls: nums[15], nclb: nums[16], anthracnose: nums[17],
      gibberella_ear: nums[18], tar_spot: nums[19],
      southern_rust: null, goss_wilt: null,
      planting_rate: null, pop_160_200: null, pop_200_240: null, pop_240_280: null,
      gdu_flower: null, gdu_blacklayer: null,
    };
    const existing = state.hybrids.findIndex(h => h.name === name);
    if (existing >= 0) {
      state.hybrids[existing] = { ...state.hybrids[existing], ...rec };
      updated++;
    } else {
      state.hybrids.push(rec);
      added++;
    }
  }
  return { added, updated };
}

function parseDekalbPdfLines(lines) {
  // Placeholder for Dekalb PDF format — Dekalb's usual cheat sheet structure is row-based
  // but the layout varies. Stub for now; user can upload Excel version.
  toast('Dekalb PDF parsing is limited — Excel version recommended');
  return { added: 0, updated: 0 };
}

function parseDekalbRows(rows) {
  // Matches the column layout from the 2026 Dekalb cheat sheet — name in first 5 cols, then RM, GDU columns, etc.
  let added = 0, updated = 0;
  for (const row of rows) {
    if (!Array.isArray(row)) continue;
    // Find hybrid name in cols 0-4
    let name = null, traitPackage = null;
    const traits = ['SSPRORIB', 'SSRIB', 'VT4PRIB', 'VT2P/TRE RIB', 'OTHER'];
    for (let i = 0; i < Math.min(5, row.length); i++) {
      const v = String(row[i] || '').trim();
      if (/^DK[CB]/i.test(v)) { name = v; traitPackage = traits[i] || ''; break; }
    }
    if (!name) continue;
    // Column layout (1-indexed within Excel but 0-indexed here)
    // 5=rm, 6=gdu_flower, 7=gdu_blacklayer, 8=planting_rate, 9=emergence, 10=seedling, 11=root,
    // 12=stalk, 13=drought, 14=greensnap, 15=plant_ht, 16=ear, 17=kernel_row, 18=staygreen,
    // 19=harvest_appearance, 20=drydown, 21=test_wt, 22=nclb, 23=gls, 24=southern_rust,
    // 25=anth, 26=goss, 27=tar_spot, 28=pop_160_200, 29=pop_200_240, 30=pop_240_280
    const clean = v => (v === null || v === '' || v === undefined) ? null : v;
    const rec = {
      name: name, source: 'Dekalb', trait_package: traitPackage, rating_scale: 'dekalb',
      rm: clean(row[5]), gdu_flower: clean(row[6]), gdu_blacklayer: clean(row[7]),
      planting_rate: clean(row[8]), emergence: clean(row[9]), seedling_growth: clean(row[10]),
      root_strength: clean(row[11]), stalk_strength: clean(row[12]), drought_tolerance: clean(row[13]),
      greensnap: clean(row[14]), plant_height: clean(row[15]), ear_placement: clean(row[16]),
      kernel_row: clean(row[17]), staygreen: clean(row[18]), harvest_appearance: clean(row[19]),
      drydown: clean(row[20]), test_weight: clean(row[21]),
      nclb: clean(row[22]), gls: clean(row[23]), southern_rust: clean(row[24]),
      anthracnose: clean(row[25]), goss_wilt: clean(row[26]), tar_spot: clean(row[27]),
      pop_160_200: clean(row[28]), pop_200_240: clean(row[29]), pop_240_280: clean(row[30]),
    };
    const existing = state.hybrids.findIndex(h => h.name === name);
    if (existing >= 0) {
      state.hybrids[existing] = { ...state.hybrids[existing], ...rec };
      updated++;
    } else {
      state.hybrids.push(rec);
      added++;
    }
  }
  return { added, updated };
}

function parsePioneerRows(rows) {
  // Pioneer in Excel format — convert each row to a line and feed through PDF line parser.
  // (Pioneer rarely publishes Excel but if a user has one, treat each row as a space-joined line.)
  const lines = rows.map(r => Array.isArray(r) ? r.filter(x => x !== '' && x !== null).join(' ') : '');
  return parsePioneerPdfLines(lines);
}

// Re-run matching across every planting whenever the hybrid library expands
function rematchAllPlantings() {
  const norm = s => {
    s = String(s || '').toUpperCase().trim();
    s = s.replace(/[\(\)\.]/g, '').replace(/\s+/g, '');
    s = s.replace(/(VT4PRIB|VT4P|VT2PRIB|VT2P|TRE|SSPRORIB|SSRIB|SSPRIB|SSXP|SSX|SSPRO|RIB|PRO|T)+$/, '');
    return s;
  };
  const libNorms = new Map();
  state.hybrids.forEach(h => libNorms.set(norm(h.name), h.name));
  let changed = 0;
  state.fields.forEach(f => {
    (f.plantings || []).forEach(p => {
      if (state.hybridOverrides[p.hybridRaw]) return; // user override locked
      if (p.matchStatus === 'exact' && p.matchedHybrid) return;
      const pn = norm(p.hybridRaw);
      if (!pn) return;
      if (libNorms.has(pn)) {
        p.matchedHybrid = libNorms.get(pn);
        p.matchStatus = 'exact';
        changed++;
      } else {
        // fuzzy: substring containment
        const candidates = [];
        for (const [n, name] of libNorms) {
          if (n && (n.includes(pn) || pn.includes(n)) && n.length >= 5) candidates.push(name);
        }
        if (candidates.length === 1) {
          p.matchedHybrid = candidates[0];
          p.matchStatus = 'fuzzy';
          changed++;
        }
      }
    });
  });
  if (changed) toast(`Re-matched ${changed} planting${changed > 1 ? 's' : ''} against expanded library`);
}

/* ============ LISTENERS & UTILITIES ============ */
function attachListeners() {
  const search = document.getElementById('searchInput');
  if (search) {
    search.addEventListener('input', e => { state.search = e.target.value; render(); });
  }
  const cf = document.getElementById('cropFilter');
  if (cf) cf.addEventListener('change', e => { state.cropFilter = e.target.value; render(); });
  const sf = document.getElementById('statusFilter');
  if (sf) sf.addEventListener('change', e => { state.statusFilter = e.target.value; render(); });
  const tf = document.getElementById('trialFilter');
  if (tf) tf.addEventListener('change', e => { state.trialFilter = e.target.value; render(); });
  const gf = document.getElementById('growerFilter');
  if (gf) gf.addEventListener('change', e => { state.growerFilter = e.target.value; render(); });

  // Dropzones
  setupDropzone('dz1', 'plantingFile', handlePlantingFile);
  setupDropzone('dz2', 'seedFile', handleSeedFile);
}

function setupDropzone(zoneId, inputId, handler) {
  const dz = document.getElementById(zoneId);
  const input = document.getElementById(inputId);
  if (!dz || !input) return;
  dz.addEventListener('click', () => input.click());
  input.addEventListener('change', e => {
    if (e.target.files.length) handler(e.target.files[0]);
  });
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('drag');
    if (e.dataTransfer.files.length) handler(e.dataTransfer.files[0]);
  });
}

function toast(msg) {
  const t = document.getElementById('toast');
  const m = document.getElementById('toastMsg');
  if (!t || !m) return;
  m.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function exportAllData() {
  const payload = {
    version: 1,
    exported_at: new Date().toISOString(),
    fields: state.fields,
    hybrids: state.hybrids,
    reports: state.reports,
    fieldStatuses: state.fieldStatuses,
    hybridOverrides: state.hybridOverrides,
    growers: state.growers,
    photos: state.photos,
    mapPins: state.mapPins,
    fieldBoundaries: state.fieldBoundaries,
    pendingBoundaries: state.pendingBoundaries,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `FieldScout_Backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup exported');
}

function handleJsonImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (!confirm('This will replace ALL current data. Continue?')) { e.target.value = ''; return; }
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data || typeof data !== 'object') throw new Error('Invalid JSON structure');
      if (data.fields) state.fields = data.fields;
      if (data.hybrids) state.hybrids = data.hybrids;
      if (data.reports) state.reports = data.reports;
      if (data.fieldStatuses) state.fieldStatuses = data.fieldStatuses;
      if (data.hybridOverrides) state.hybridOverrides = data.hybridOverrides;
      if (data.growers) state.growers = data.growers;
      if (data.photos) state.photos = data.photos;
      if (data.mapPins) state.mapPins = data.mapPins;
      if (data.fieldBoundaries) state.fieldBoundaries = data.fieldBoundaries;
      if (data.pendingBoundaries) state.pendingBoundaries = data.pendingBoundaries;
      // Repair: for any planting where the raw string equals a library hybrid name, link them.
      // Catches the case where the user manually added a hybrid record for a "C205-08 Pro" planting
      // — without this, the planting still shows as unknown.
      let repaired = 0;
      const byName = new Map(state.hybrids.map(h => [h.name, h]));
      state.fields.forEach(f => (f.plantings || []).forEach(p => {
        if (!p.matchedHybrid && p.hybridRaw && byName.has(p.hybridRaw)) {
          p.matchedHybrid = p.hybridRaw;
          p.matchStatus = 'exact';
          repaired++;
        }
      }));
      toast(`Restored: ${state.fields.length} fields, ${state.hybrids.length} hybrids, ${state.reports.length} reports${repaired ? `, ${repaired} matches repaired` : ''}`);
      render();
    } catch (err) {
      toast('Import failed: ' + err.message);
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

/* ============ BOUNDARY IMPORT ============ */
function handleBoundaryFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const ext = (file.name.split('.').pop() || '').toLowerCase();
  toast('Reading boundaries…');
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      let geojson;
      if (ext === 'zip' || ext === 'shp') {
        if (!window.shp) throw new Error('Shapefile library not loaded');
        geojson = await window.shp(ev.target.result);
      } else if (ext === 'geojson' || ext === 'json') {
        const text = typeof ev.target.result === 'string' ? ev.target.result : new TextDecoder().decode(ev.target.result);
        geojson = JSON.parse(text);
      } else if (ext === 'kml' || ext === 'kmz') {
        toast('KML/KMZ not yet supported — please re-export as zipped shapefile or GeoJSON');
        e.target.value = ''; return;
      } else {
        throw new Error('Unsupported file type: ' + ext);
      }
      processGeoJsonBoundaries(geojson);
    } catch (err) {
      console.error(err);
      toast('Boundary import failed: ' + err.message);
    }
    e.target.value = '';
  };
  if (ext === 'geojson' || ext === 'json') reader.readAsText(file);
  else reader.readAsArrayBuffer(file);
}

function processGeoJsonBoundaries(gj) {
  // shpjs returns either a single FeatureCollection or an array (multi-shapefile zip)
  const collections = Array.isArray(gj) ? gj : [gj];
  let total = 0, autoMatched = 0;
  state.pendingBoundaries = [];
  collections.forEach(fc => {
    if (!fc || !fc.features) return;
    fc.features.forEach(feat => {
      const coords = extractPolygonCoords(feat.geometry);
      if (!coords || coords.length < 3) return;
      // Try common name properties
      const props = feat.properties || {};
      const sourceName = props.Name || props.name || props.NAME || props.FIELD || props.field
        || props.Field_Name || props.field_name || props.FIELDNAME || props.Label
        || props.label || '(unnamed)';
      total++;
      // Auto-match: ≥0.85 similarity → link directly
      const match = findBestFieldMatch(sourceName);
      if (match && match.score >= 0.85) {
        state.fieldBoundaries[match.field.id] = { coords, sourceName, score: match.score };
        autoMatched++;
      } else {
        state.pendingBoundaries.push({ sourceName, coords });
      }
    });
  });
  if (total === 0) { toast('No polygon features found in file'); return; }
  toast(`Imported ${total} boundaries · ${autoMatched} auto-matched · ${state.pendingBoundaries.length} need review`);
  render();
}

// Extract first ring of polygon coordinates from a geometry, converted to [lat, lng] for Leaflet
function extractPolygonCoords(geom) {
  if (!geom) return null;
  let ring;
  if (geom.type === 'Polygon') ring = geom.coordinates[0];
  else if (geom.type === 'MultiPolygon') ring = geom.coordinates[0][0]; // first polygon, outer ring
  else return null;
  return ring.map(([lng, lat]) => [lat, lng]);
}

function findBestFieldMatch(sourceName) {
  if (!sourceName) return null;
  // Skip fields that already have a boundary
  const candidates = state.fields.filter(f => !state.fieldBoundaries[f.id]);
  let best = null;
  candidates.forEach(f => {
    const score = similarityScore(sourceName, f.name);
    if (!best || score > best.score) best = { field: f, score };
  });
  return best;
}

function openBoundaryMatcher() {
  if (state.pendingBoundaries.length === 0) { toast('No pending boundaries'); return; }
  // Sort fields alphabetically for dropdown
  const availableFields = state.fields
    .filter(f => !state.fieldBoundaries[f.id])
    .slice()
    .sort((a, b) => a.name.localeCompare(b.name));
  const fieldOpts = availableFields.map(f => {
    const planted = (f.plantings && f.plantings.length > 0)
      ? ` (${f.acres.toFixed(0)} ac · ${f.isTrial ? f.plantings.length + ' varieties' : (f.hybrid || 'no hybrid')})`
      : ` (${f.acres.toFixed(0)} ac)`;
    return `<option value="${esc(f.id)}">${esc(f.name)}${planted}</option>`;
  }).join('');

  const rows = state.pendingBoundaries.map((p, idx) => {
    // Pre-select best candidate by similarity
    let bestId = '';
    let bestScore = 0;
    availableFields.forEach(f => {
      const s = similarityScore(p.sourceName, f.name);
      if (s > bestScore) { bestScore = s; bestId = f.id; }
    });
    const optsWithSel = fieldOpts.replace(`value="${bestId}"`, `value="${bestId}" selected`);
    return `
      <div class="bm-row" id="bm-row-${idx}">
        <div class="bm-source">
          <div class="bm-name">${esc(p.sourceName)}</div>
          <div class="bm-meta">${p.coords.length} points${bestScore > 0 ? ' · best guess ' + Math.round(bestScore * 100) + '%' : ''}</div>
        </div>
        <select class="filter-select bm-select" id="bm-sel-${idx}">
          <option value="">— Pick field —</option>
          ${optsWithSel}
        </select>
        <div class="bm-actions">
          <button class="btn btn-primary btn-small" onclick="assignBoundary(${idx})">Link</button>
          <button class="btn btn-ghost btn-small" onclick="skipPendingBoundary(${idx})">Skip</button>
        </div>
      </div>
    `;
  }).join('');

  openModal(`
    <div class="modal-head">
      <div>
        <div class="modal-title">Match Boundaries to Fields</div>
        <div class="modal-sub">${state.pendingBoundaries.length} boundaries pending · ${availableFields.length} fields available</div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="match-intro">Pick the field each boundary belongs to. Best guess is pre-selected — change if wrong. Click Link to attach, Skip to discard.</div>
      <div class="bm-list">${rows}</div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Close (resume later)</button>
      <button class="btn btn-primary" onclick="assignAllBoundaries()">Link All Selected</button>
    </div>
  `);
}

function assignBoundary(idx) {
  const p = state.pendingBoundaries[idx];
  if (!p) return;
  const sel = document.getElementById('bm-sel-' + idx);
  if (!sel || !sel.value) { toast('Pick a field first'); return; }
  const fieldId = sel.value;
  state.fieldBoundaries[fieldId] = { coords: p.coords, sourceName: p.sourceName, score: 1 };
  state.pendingBoundaries.splice(idx, 1);
  const fname = state.fields.find(f => f.id === fieldId)?.name || fieldId;
  toast(`Linked ${p.sourceName} → ${fname}`);
  if (state.pendingBoundaries.length > 0) openBoundaryMatcher();
  else { closeModal(); render(); }
}

function assignAllBoundaries() {
  let linked = 0;
  // Iterate in reverse so indices stay valid as we splice
  for (let i = state.pendingBoundaries.length - 1; i >= 0; i--) {
    const sel = document.getElementById('bm-sel-' + i);
    if (sel && sel.value && !state.fieldBoundaries[sel.value]) {
      const p = state.pendingBoundaries[i];
      state.fieldBoundaries[sel.value] = { coords: p.coords, sourceName: p.sourceName, score: 1 };
      state.pendingBoundaries.splice(i, 1);
      linked++;
    }
  }
  closeModal();
  toast(`Linked ${linked} boundaries${state.pendingBoundaries.length ? ` · ${state.pendingBoundaries.length} remain` : ''}`);
  render();
}

function skipPendingBoundary(idx) {
  state.pendingBoundaries.splice(idx, 1);
  if (state.pendingBoundaries.length > 0) openBoundaryMatcher();
  else { closeModal(); toast('All boundaries reviewed'); render(); }
}

function cycleRole() {
  const idx = ROLES.indexOf(state.role);
  state.role = ROLES[(idx + 1) % ROLES.length];
  document.getElementById('roleBadge').textContent = state.role;
  toast('Role: ' + state.role);
}

render();
</script>
